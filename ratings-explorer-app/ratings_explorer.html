<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AGA Ratings Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #eaf3fa;
      --panel: #ffffff;
      --panel-alt: #f4f9fd;
      --ink: #163248;
      --muted: #5a7082;
      --line: #bfd4e5;
      --accent: #3a73b2;
      --accent-strong: #014a7d;
      --accent-soft: rgba(174, 208, 232, 0.32);
      --shadow: 0 18px 40px rgba(1, 74, 125, 0.12);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Red Hat Text", Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(1, 74, 125, 0.14), transparent 28%),
        radial-gradient(circle at bottom right, rgba(174, 208, 232, 0.60), transparent 32%),
        var(--bg);
    }
    .wrap {
      max-width: 1380px;
      margin: 0 auto;
      padding: 18px 16px 34px;
    }
    .shell, .stack, .detail-grid, .result-list, .mini-list {
      display: grid;
      gap: 16px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid rgba(31, 41, 55, 0.10);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 20px;
    }
    .hidden {
      display: none !important;
    }
    .hero { padding: 14px 18px; }
    .hero {
      background: linear-gradient(135deg, rgba(174, 208, 232, 0.55), rgba(58, 115, 178, 0.12)), var(--panel);
    }
    h1, h2, h3 {
      margin: 0;
      line-height: 1.08;
    }
    h1 { font-size: clamp(2rem, 3vw, 3rem); }
    h2 { font-size: 1.35rem; }
    h3 { font-size: 1.05rem; }
    .subtitle, .eyebrow, .status, .meta-line { color: var(--muted); }
    .hero-meta {
      margin-top: 10px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .snapshot-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid rgba(31, 41, 55, 0.10);
      background: rgba(255, 255, 255, 0.78);
      color: #4b5563;
      font-size: 0.92rem;
    }
    .snapshot-badge strong {
      color: var(--ink);
      font-weight: 700;
    }
    .modebar, .actions, .pillrow, .metric-grid, .headline, .results-header, .section-head {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .headline, .results-header, .section-head { justify-content: space-between; align-items: baseline; }
    .section-tools {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
      margin-left: auto;
    }
    .modebar { margin-top: 10px; }
    .modebar button, .action {
      border: 0;
      border-radius: 999px;
      height: 42px;
      padding: 0 15px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    .modebar button { background: rgba(255, 255, 255, 0.7); border: 1px solid rgba(31, 41, 55, 0.10); }
    .modebar button.active, .action { background: var(--accent); color: white; }
    .action.secondary { background: white; color: var(--ink); border: 1px solid var(--line); }
    .action:disabled,
    .modebar button:disabled {
      cursor: not-allowed;
      background: #9ca3af;
      color: white;
      border-color: #9ca3af;
      opacity: 0.75;
      transform: none;
      box-shadow: none;
    }
    .action.action-compact {
      height: 36px;
      padding: 0 14px;
      font-size: 0.88rem;
      white-space: nowrap;
    }
    .search-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
      align-items: end;
    }
    .field { display: grid; gap: 6px; }
    .field.hidden { display: none; }
    .field label { font-size: 0.88rem; color: #4b5563; font-weight: 700; }
    .inline-field {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 42px;
      white-space: nowrap;
    }
    .inline-field label {
      font-size: 0.88rem;
      color: #4b5563;
      font-weight: 700;
    }
    .inline-field select {
      width: auto;
      min-width: 88px;
    }
    .multi-select {
      position: relative;
    }
    .multi-select-trigger {
      width: 100%;
      min-width: 0;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 9px 38px 9px 11px;
      font: inherit;
      text-align: left;
      background: rgba(255, 255, 255, 0.92);
      color: var(--ink);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: border-color 120ms ease, box-shadow 120ms ease, background 120ms ease;
    }
    .multi-select-trigger:hover {
      border-color: rgba(58, 115, 178, 0.35);
      background: rgba(255, 255, 255, 0.98);
    }
    .multi-select-trigger:focus-visible {
      outline: none;
      border-color: rgba(1, 74, 125, 0.45);
      box-shadow: 0 0 0 3px rgba(58, 115, 178, 0.18);
    }
    .multi-select-trigger.active {
      border-color: rgba(58, 115, 178, 0.4);
      box-shadow: 0 0 0 3px rgba(174, 208, 232, 0.55);
      background: #ffffff;
    }
    .multi-select-trigger::after {
      content: "v";
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.9rem;
      transition: transform 120ms ease, color 120ms ease;
    }
    .multi-select-trigger.active::after {
      transform: translateY(-50%) rotate(180deg);
      color: var(--accent-strong);
    }
    .multi-select-menu {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      z-index: 20;
      display: grid;
      gap: 0;
      width: max(100%, 280px);
      max-width: min(420px, calc(100vw - 32px));
      max-height: min(360px, calc(100vh - 140px));
      overflow: auto;
      padding: 8px;
      border: 1px solid rgba(31, 41, 55, 0.12);
      border-radius: 16px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    .multi-select-menu.align-right {
      left: auto;
      right: 0;
    }
    .multi-select-menu.hidden {
      display: none;
    }
    .multi-select-search {
      position: sticky;
      top: 0;
      z-index: 2;
      padding-bottom: 6px;
      background: linear-gradient(180deg, var(--panel) 82%, rgba(255, 253, 248, 0));
    }
    .multi-select-search-input {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 7px 9px;
      font: inherit;
      background: rgba(255, 255, 255, 0.96);
    }
    .multi-select-search-input:focus-visible {
      outline: none;
      border-color: rgba(1, 74, 125, 0.45);
      box-shadow: 0 0 0 3px rgba(58, 115, 178, 0.14);
    }
    .multi-select-options {
      display: grid;
      gap: 2px;
    }
    .multi-select-option {
      display: grid;
      grid-template-columns: 16px minmax(0, 1fr);
      align-items: center;
      gap: 8px;
      padding: 6px 6px;
      font-size: 0.88rem;
      line-height: 1.15;
      cursor: pointer;
      justify-items: start;
      border-radius: 10px;
      transition: background 120ms ease;
    }
    .multi-select-option:hover {
      background: rgba(174, 208, 232, 0.28);
    }
    .multi-select-option.hidden {
      display: none;
    }
    .multi-select-option input {
      margin: 0;
      justify-self: start;
    }
    .multi-select-option span {
      min-width: 0;
    }
    .multi-select-footer {
      position: sticky;
      bottom: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 6px;
      padding-top: 8px;
      background: linear-gradient(0deg, var(--panel) 82%, rgba(255, 253, 248, 0));
      border-top: 1px solid rgba(31, 41, 55, 0.08);
    }
    .multi-select-selection-note {
      min-width: 0;
      color: var(--muted);
      font-size: 0.8rem;
    }
    .multi-select-clear {
      border: 0;
      border-radius: 999px;
      padding: 6px 10px;
      font: inherit;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--accent-strong);
      background: rgba(174, 208, 232, 0.32);
      cursor: pointer;
      white-space: nowrap;
    }
    .multi-select-clear:hover {
      background: rgba(58, 115, 178, 0.18);
    }
    .multi-select-clear:disabled {
      opacity: 0.45;
      cursor: default;
    }
    .multi-select-empty {
      padding: 8px 2px 4px;
      color: var(--muted);
      font-size: 0.84rem;
    }
    .field input, .field select {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 9px 11px;
      font: inherit;
      background: rgba(255, 255, 255, 0.92);
    }
    .field input:disabled, .field select:disabled { background: #f5f5f4; color: #a8a29e; }
    .layout {
      display: grid;
      grid-template-columns: minmax(300px, 0.9fr) minmax(0, 1.5fr);
      gap: 16px;
      align-items: start;
    }
    .layout.focus-mode {
      grid-template-columns: minmax(0, 1fr);
      grid-template-areas:
        "results"
        "detail";
      align-items: start;
    }
    .layout.focus-mode .stack {
      display: contents;
    }
    .layout.focus-mode #results-panel { grid-area: results; }
    .layout.focus-mode #detail-panel { grid-area: detail; }
    .layout.focus-mode #context-panel { display: none; }
    .layout.focus-mode #detail-panel.hidden { display: none; }
    .result-list {
      gap: 8px;
    }
    .layout.focus-mode #results-panel .result-list {
      grid-template-columns: 1fr;
    }
    .layout.focus-mode #results-panel .result-card {
      width: 100%;
      padding: 4px 16px;
    }
    .layout.focus-mode #results-panel .result-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      width: 100%;
    }
    .layout.focus-mode #results-panel .result-main {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      overflow: hidden;
    }
    .layout.focus-mode #results-panel .result-main .title {
      min-width: 0;
      flex: 1 1 auto;
    }
    .layout.focus-mode #results-panel .result-main .subtitle {
      flex: 0 1 auto;
    }
    .layout.focus-mode #results-panel .result-meta {
      display: block;
      flex: 0 0 auto;
      align-items: center;
      white-space: nowrap;
      text-align: right;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.1;
    }
    .layout.focus-mode #results-panel .headline {
      flex-wrap: nowrap;
      align-items: center;
      gap: 14px;
    }
    .layout.focus-mode #results-panel .headline > div:first-child {
      min-width: 0;
      flex: 1 1 auto;
    }
    .layout.focus-mode #results-panel .title,
    .layout.focus-mode #results-panel .subtitle {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .result-card, .mini-card, .detail-card, .metric {
      border: 1px solid rgba(31, 41, 55, 0.10);
      border-radius: 16px;
      padding: 14px;
      background: white;
    }
    .detail-card, .metric {
      border-color: #014a7d;
      box-shadow: inset 0 0 0 1px #014a7d;
    }
    .result-card { cursor: pointer; padding: 4px 12px; }
    .result-card.active { border-color: rgba(1, 74, 125, 0.45); }
    .title { font-size: 1.15rem; font-weight: 700; }
    .pill {
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.84rem;
      background: var(--accent-soft);
      color: var(--accent-strong);
    }
    .sgf-summary {
      max-width: 100%;
      text-align: right;
      white-space: normal;
    }
    .result-card .headline { align-items: flex-start; gap: 6px; }
    .result-card .title,
    .result-card .subtitle,
    .result-card .meta-line {
      line-height: 1.05;
    }
    .result-card .subtitle { margin-top: 0; margin-bottom: 0; }
    .result-card .result-meta { margin-top: 0; }
    .meta-line {
      font-size: 0.9rem;
      line-height: 1.05;
    }
    .meta-line + .meta-line { margin-top: 0; }
    .metric-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin-top: 16px; }
    .metric { background: var(--panel-alt); }
    .metric .label { color: var(--muted); font-size: 0.84rem; text-transform: uppercase; }
    .metric .value { margin-top: 6px; font-size: 1.4rem; font-weight: 700; }
    .context-list {
      display: grid;
      gap: 8px;
    }
    .context-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      border: 1px solid #014a7d;
      border-radius: 14px;
      background: var(--panel-alt);
      box-shadow: inset 0 0 0 1px #014a7d;
    }
    .context-kind {
      color: var(--accent-strong);
      font-size: 0.78rem;
      font-weight: 800;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .context-main {
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .context-main .linkish {
      display: inline-block;
      max-width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      vertical-align: bottom;
    }
    .context-meta {
      color: var(--muted);
      font-size: 0.84rem;
      white-space: nowrap;
    }
    .table-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .table-scroll table {
      min-width: 640px;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
    th, td { text-align: left; padding: 9px 8px; border-bottom: 1px solid var(--line); vertical-align: top; }
    th { color: var(--muted); font-size: 0.83rem; text-transform: uppercase; }
    .linkish { color: var(--accent-strong); text-decoration: none; font-weight: 700; cursor: pointer; }
    .linkish:hover { text-decoration: underline; }
    .empty {
      border: 1px dashed var(--line);
      border-radius: 16px;
      padding: 20px;
      color: var(--muted);
      background: rgba(255,255,255,0.6);
    }
    .chart-shell {
      position: relative;
      border: 1px solid #014a7d;
      border-radius: 18px;
      overflow: hidden;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.98), rgba(244, 249, 253, 0.98));
      box-shadow: inset 0 0 0 1px #014a7d;
    }
    .chart-svg {
      display: block;
      width: 100%;
      height: auto;
      font-family: "Red Hat Text", "Segoe UI", Helvetica, Arial, sans-serif;
    }
    .chart-svg text {
      font-family: "Red Hat Text", "Segoe UI", Helvetica, Arial, sans-serif;
    }
    .chart-grid-line {
      stroke: #d9e7f2;
      stroke-width: 1;
    }
    .chart-axis {
      stroke: var(--accent-strong);
      stroke-width: 1.5;
    }
    .chart-band {
      fill: #aed0e8;
      fill-opacity: 0.42;
    }
    .chart-line {
      fill: none;
      stroke: #3a73b2;
      stroke-width: 3;
      stroke-linejoin: round;
      stroke-linecap: round;
    }
    .chart-point {
      fill: var(--accent-strong);
      stroke: #ffffff;
      stroke-width: 1.4;
      cursor: pointer;
      transition: r 120ms ease, fill 120ms ease;
    }
    .chart-point.is-active, .chart-point:hover, .chart-point:focus {
      fill: var(--accent);
      r: 5.6;
      outline: none;
    }
    .chart-label {
      fill: #4a6477;
      font-size: 13px;
      font-weight: 700;
    }
    .chart-axis-label {
      fill: #163248;
      font-size: 14px;
      font-weight: 700;
    }
    .chart-title {
      fill: #163248;
      font-size: 24px;
      font-weight: 700;
    }
    .chart-tooltip {
      position: absolute;
      left: 0;
      top: 0;
      min-width: 150px;
      padding: 9px 11px;
      border: 1px solid rgba(1, 74, 125, 0.16);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 16px 28px rgba(1, 74, 125, 0.14);
      color: var(--ink);
      pointer-events: none;
      transform: translate(-50%, calc(-100% - 12px));
      z-index: 3;
    }
    .chart-tooltip.hidden {
      display: none;
    }
    .chart-tooltip-date {
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 3px;
    }
    .chart-tooltip-value {
      font-size: 0.98rem;
      font-weight: 700;
    }
    .chart-tooltip-meta {
      color: var(--muted);
      font-size: 0.8rem;
      margin-top: 2px;
    }
    .crosstab-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel-alt);
    }
    .crosstab {
      width: max-content;
      min-width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 0.84rem;
    }
    .crosstab th, .crosstab td {
      min-width: 82px;
      text-align: center;
      padding: 6px 5px;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      vertical-align: middle;
      background: var(--panel);
    }
    .crosstab th.sticky-corner,
    .crosstab th.sticky-row,
    .crosstab th.sticky-col {
      position: sticky;
      background: var(--panel-alt);
      z-index: 2;
    }
    .crosstab th.sticky-corner {
      left: 0;
      top: 0;
      z-index: 4;
      min-width: 156px;
      text-align: left;
    }
    .crosstab th.sticky-col {
      left: 0;
      z-index: 3;
      min-width: 156px;
      text-align: left;
    }
    .crosstab th.sticky-row {
      top: 0;
      z-index: 3;
      min-width: 60px;
    }
    .crosstab-player {
      display: block;
      font-weight: 700;
      color: var(--accent-strong);
      text-decoration: none;
      text-align: left;
      line-height: 1.15;
    }
    .crosstab-player:hover { text-decoration: underline; }
    .crosstab-player-main {
      display: flex;
      align-items: baseline;
      gap: 4px;
      flex-wrap: wrap;
    }
    .crosstab-player-number {
      color: var(--accent-strong);
      font-weight: 800;
      min-width: 1.3rem;
    }
    .crosstab-player-name {
      min-width: 0;
      overflow-wrap: anywhere;
    }
    .crosstab-meta {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.7rem;
      text-align: left;
      line-height: 1.2;
    }
    .crosstab-rank {
      display: inline-flex;
      font-weight: 700;
      color: var(--accent-strong);
    }
    .crosstab-cell {
      display: grid;
      gap: 3px;
      justify-items: center;
      line-height: 1.15;
      text-align: center;
    }
    .crosstab-opponent {
      color: var(--accent-strong);
      text-decoration: none;
      font-weight: 700;
      line-height: 1.15;
      font-size: 0.72rem;
    }
    .crosstab-opponent:hover { text-decoration: underline; }
    .crosstab-outcome {
      color: var(--ink);
      font-size: 0.72rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .crosstab-diagonal {
      background: rgba(174, 208, 232, 0.4);
      color: var(--accent-strong);
      font-weight: 700;
    }
    .crosstab-empty {
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 700;
      text-transform: lowercase;
    }
    .crosstab-games {
      display: grid;
      gap: 4px;
    }
    .crosstab-token {
      display: inline;
      padding: 0;
      border-radius: 0;
      background: transparent;
      color: var(--accent-strong);
      font-size: 0.74rem;
      font-weight: 700;
      white-space: normal;
    }
    .sgf-link, .crosstab-token.sgf-link {
      border: 0;
      background: transparent;
      color: var(--accent-strong);
      padding: 0;
      font: inherit;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 0.12em;
    }
    .sgf-link:hover, .crosstab-token.sgf-link:hover {
      color: var(--accent);
    }
    .sgf-link.muted {
      text-decoration: none;
      color: var(--muted);
      cursor: default;
    }
    .sgf-viewer-frame {
      width: 100%;
      min-height: 364px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #f6fbff;
    }
    .sgf-modal {
      position: fixed;
      inset: 0;
      z-index: 1200;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 18px 24px 24px;
      background: rgba(9, 18, 31, 0.58);
    }
    .sgf-modal.hidden {
      display: none;
    }

    function setSearchBusy(isBusy) {

    function clearAgaidFilter() {

    function endpoint(path, params) {
      const url = new URL((API_BASE || window.location.origin) + path, window.location.origin);
      Object.entries(params || {}).forEach(([key, value]) => {
        if (value !== null && value !== undefined && String(value).trim() !== "") {
          url.searchParams.set(key, String(value).trim());
        }
      });
      return url.toString();
    }

    function isAbortError(error) {
      return Boolean(error && (error.name === "AbortError" || /aborted/i.test(String(error.message || ""))));
    }

    function cancelRequest(key) {
      const controller = state.requestControllers[key];
      if (controller) controller.abort();
      state.requestControllers[key] = null;
    }

    function beginRequest(key) {
      cancelRequest(key);
      const controller = new AbortController();
      state.requestControllers[key] = controller;
      return controller;
    }

    function endRequest(key, controller) {
      if (state.requestControllers[key] === controller) {
        state.requestControllers[key] = null;
      }
    }

    async function loadJson(path, params, options = {}) {
      const url = endpoint(path, params);
      let response;
      try {
        response = await fetch(url, { signal: options.signal });
      } catch (error) {
        if (isAbortError(error)) throw error;
        throw new Error(`Failed to fetch ${url}. If this page is opened directly from a local file, try the deployed explorer page or a hosted page instead.`);
      }
      if (!response.ok) {
        throw new Error((await response.text()) || `Request failed with ${response.status}`);
      }
      return response.json();
    }

    function populateSelectOptions(select, options, placeholder) {

      const placeholderOption = `<option value="">${escapeHtml(placeholder)}</option>`;
      const optionHtml = (options || []).map((option) => {
        if (typeof option === "string") {
          return `<option value="${escapeHtml(option)}">${escapeHtml(option)}</option>`;
        }
        return `<option value="${escapeHtml(option.value)}">${escapeHtml(option.label)}</option>`;
      }).join("");
      select.innerHTML = placeholderOption + optionHtml;
      if ([...select.options].some((option) => option.value === currentValue)) {
        select.value = currentValue;
      }
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function formatDate(value) {
      if (!value) return "Unknown date";
      const parsed = new Date(value + "T00:00:00");
      if (Number.isNaN(parsed.getTime())) return value;
      return parsed.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
    }

    function formatShortDate(value) {
      if (!value) return "n/a";
      const parsed = new Date(value + "T00:00:00");
      if (Number.isNaN(parsed.getTime())) return value;
      return parsed.toLocaleDateString("en-US", { year: "numeric", month: "2-digit", day: "2-digit" });
    }

    function formatDateTime(value) {
      if (!value) return "Unknown";
      const parsed = new Date(value);
      if (Number.isNaN(parsed.getTime())) return value;
      return parsed.toLocaleString(undefined, {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit",
        timeZoneName: "short"
      });
    }

    function formatRating(value) {
      const numeric = Number(value);
      return Number.isFinite(numeric) ? numeric.toFixed(2) : "n/a";
    }

    function playerLabelWithRank(name, rank, color) {
      const safeName = String(name || "").trim();
      const safeRank = String(rank || "").trim();

      const safeColor = String(color || "").trim().toUpperCase();
      return safeColor ? `${base} (${safeColor})` : base;
    }

    function formatMonthYear(value) {
      if (!value) return "Unknown";
      const parsed = new Date(value + "T00:00:00");
      if (Number.isNaN(parsed.getTime())) return value;
      return parsed.toLocaleDateString(undefined, { year: "numeric", month: "short" });
    }

    function buildInteractiveHistoryChart(player, historyPoints) {
      const points = (historyPoints || [])
        .map((item) => {
          const parsed = new Date(`${item.date}T00:00:00`);
          const rating = Number(item.rating);
          const sigma = Number(item.sigma ?? 0);
          if (Number.isNaN(parsed.getTime()) || !Number.isFinite(rating)) return null;
          return { date: item.date, parsed, rating, sigma: Number.isFinite(sigma) ? sigma : 0 };
        })
        .filter(Boolean)
        .sort((a, b) => a.parsed - b.parsed);
      if (!points.length) {
        return '<div class="empty">No official rating history was found for this player.</div>';
      }

      const width = 1200;
      const height = 520;
      const left = 88;
      const right = 26;
      const top = 52;
      const bottom = 62;
      const plotWidth = width - left - right;
      const plotHeight = height - top - bottom;

      const minDate = points[0].parsed;
      const maxDate = points[points.length - 1].parsed;
      const chartRating = (value) => {
        if (value <= -1) return value;
        if (value >= 1) return value - 2;
        return -1;
      };
      const chartTickLabel = (tick) => {
        if (tick === -1) return "1/-1";
        return tick >= 0 ? String(tick + 2) : String(tick);
      };

      const centerChartRatings = points.map((point) => chartRating(point.rating));
      let minChartRating = Math.min(...points.map((point, index) => centerChartRatings[index] - point.sigma));
      let maxChartRating = Math.max(...points.map((point, index) => centerChartRatings[index] + point.sigma));
      if (minChartRating === maxChartRating) {
        minChartRating -= 1;
        maxChartRating += 1;
      }
      const chartPadding = Math.max((maxChartRating - minChartRating) * 0.05, 0.25);
      minChartRating -= chartPadding;
      maxChartRating += chartPadding;

      const xPos = (date) => {
        const totalDays = Math.max(1, Math.round((maxDate - minDate) / 86400000));
        return left + ((((date - minDate) / 86400000)) / totalDays) * plotWidth;
      };
      const yPos = (rating) => top + ((maxChartRating - chartRating(rating)) / (maxChartRating - minChartRating)) * plotHeight;
      const yPosChart = (chartValue) => top + ((maxChartRating - chartValue) / (maxChartRating - minChartRating)) * plotHeight;

      const polyline = points.map((point) => `${xPos(point.parsed).toFixed(2)},${yPos(point.rating).toFixed(2)}`).join(" ");
      const sigmaBand = [
        ...points.map((point) => `${xPos(point.parsed).toFixed(2)},${yPosChart(chartRating(point.rating) + point.sigma).toFixed(2)}`),
        ...[...points].reverse().map((point) => `${xPos(point.parsed).toFixed(2)},${yPosChart(chartRating(point.rating) - point.sigma).toFixed(2)}`)
      ].join(" ");

      const xTicks = [];
      for (let year = minDate.getFullYear(); year <= maxDate.getFullYear(); year += 2) {
        const tick = new Date(year, 0, 1);
        if (tick >= minDate && tick <= maxDate) xTicks.push(tick);
      }
      if (!xTicks.length) xTicks.push(minDate, maxDate);

      const yStart = Math.floor(minChartRating);
      const yEnd = Math.ceil(maxChartRating);
      let yTicks = [];
      for (let tick = yStart; tick <= yEnd; tick += 1) yTicks.push(tick);
      if (yStart <= -1 && yEnd >= -1 && !yTicks.includes(-1)) yTicks.push(-1);
      if (yTicks.length < 2) yTicks = [...new Set([Math.floor(minChartRating), Math.ceil(maxChartRating)])];
      else yTicks = [...new Set(yTicks)].sort((a, b) => a - b);

      const title = escapeHtml(player.display_name || `AGAID ${player.agaid}`);
      const xGrid = xTicks.map((tick) => {
        const x = xPos(tick);
        return `<line class="chart-grid-line" x1="${x.toFixed(2)}" y1="${top}" x2="${x.toFixed(2)}" y2="${top + plotHeight}"></line><text class="chart-label" x="${x.toFixed(2)}" y="${height - 24}" text-anchor="middle">${tick.getFullYear()}</text>`;
      }).join("");
      const yGrid = yTicks.map((tick) => {
        const y = top + ((maxChartRating - tick) / (maxChartRating - minChartRating)) * plotHeight;
        return `<line class="chart-grid-line" x1="${left}" y1="${y.toFixed(2)}" x2="${left + plotWidth}" y2="${y.toFixed(2)}"></line><text class="chart-label" x="${left - 10}" y="${(y + 4).toFixed(2)}" text-anchor="end">${escapeHtml(chartTickLabel(tick))}</text>`;
      }).join("");
      const pointMarkup = points.map((point, index) => {
        const x = xPos(point.parsed).toFixed(2);
        const y = yPos(point.rating).toFixed(2);
        const label = `Date ${formatDate(point.date)}, rating ${formatRating(point.rating)}, sigma ${formatRating(point.sigma)}`;
        return `<circle class="chart-point" cx="${x}" cy="${y}" r="4.3" tabindex="0" role="img" aria-label="${escapeHtml(label)}" data-point-index="${index}" data-date="${escapeHtml(point.date)}" data-rating="${formatRating(point.rating)}" data-sigma="${formatRating(point.sigma)}"></circle>`;
      }).join("");

      return `<div class="chart-shell"><div class="chart-tooltip hidden" aria-hidden="true"></div><svg class="chart-svg" viewBox="0 0 ${width} ${height}" aria-label="Rating history chart for ${title}" role="img"><rect width="100%" height="100%" fill="#ffffff"></rect><rect width="100%" height="100%" fill="url(#historyChartBg)"></rect><defs><linearGradient id="historyChartBg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ffffff"></stop><stop offset="100%" stop-color="#f4f9fd"></stop></linearGradient></defs><text class="chart-title" x="${width / 2}" y="28" text-anchor="middle">${title}</text>${xGrid}${yGrid}<line class="chart-axis" x1="${left}" y1="${top}" x2="${left}" y2="${top + plotHeight}"></line><line class="chart-axis" x1="${left}" y1="${top + plotHeight}" x2="${left + plotWidth}" y2="${top + plotHeight}"></line><polygon class="chart-band" points="${sigmaBand}"></polygon><polyline class="chart-line" points="${polyline}"></polyline>${pointMarkup}<text class="chart-axis-label" x="${width / 2}" y="${height - 4}" text-anchor="middle">Date</text><text class="chart-axis-label" x="24" y="${height / 2}" transform="rotate(-90 24 ${height / 2})" text-anchor="middle">Rating</text></svg></div>`;
    }

    function wireHistoryChart(root) {
      const shell = root.querySelector(".chart-shell");
      if (!shell) return;
      const tooltip = shell.querySelector(".chart-tooltip");
      const points = shell.querySelectorAll(".chart-point");

      const hideTooltip = () => {
        tooltip.classList.add("hidden");
        tooltip.setAttribute("aria-hidden", "true");
        points.forEach((point) => point.classList.remove("is-active"));
      };

      const showTooltip = (point) => {
        const shellRect = shell.getBoundingClientRect();
        const pointRect = point.getBoundingClientRect();
        points.forEach((node) => node.classList.toggle("is-active", node === point));
        tooltip.innerHTML = `<div class="chart-tooltip-date">${escapeHtml(formatMonthYear(point.dataset.date))}</div><div class="chart-tooltip-value">Rating ${escapeHtml(point.dataset.rating)}</div><div class="chart-tooltip-meta">Sigma ${escapeHtml(point.dataset.sigma)}</div>`;
        tooltip.classList.remove("hidden");
        tooltip.setAttribute("aria-hidden", "false");
        tooltip.style.left = `${pointRect.left - shellRect.left + (pointRect.width / 2)}px`;
        tooltip.style.top = `${pointRect.top - shellRect.top}px`;
      };

      points.forEach((point) => {
        point.addEventListener("mouseenter", () => showTooltip(point));
        point.addEventListener("focus", () => showTooltip(point));
        point.addEventListener("mouseleave", hideTooltip);
        point.addEventListener("blur", hideTooltip);
      });
      shell.addEventListener("mouseleave", hideTooltip);
    }

    function tableHtml(headers, rows) {
      return `<table><thead><tr>${headers.map((header) => `<th>${header}</th>`).join("")}</tr></thead><tbody>${rows.join("")}</tbody></table>`;
    }

    function scrollTableHtml(headers, rows) {

    }

    function formatDelimitedFields(values) {
      return values.map((value) => escapeHtml(String(value || ""))).join(" | ");

    function compactChapterTriggerLabel(option) {
      return option.value === BLANK_CHAPTER_VALUE ? "blank" : option.value;
    }

    function pluralize(count, singular, plural = `${singular}s`) {
      return `${count} ${count === 1 ? singular : plural}`;
    }

    function setMultiSelectTriggerLabel(trigger, text, title = "") {
      trigger.textContent = text;
      trigger.title = title || text;
    }

    function summarizeSelectionLabels(labels, singularLabel, pluralLabel = `${singularLabel}s`) {
      if (!labels.length) return "";
      const joined = labels.join(", ");
      if (joined.length <= 30) return joined;
      if (labels.length === 1) return labels[0];
      if (labels.length === 2) return `${labels[0]}, ${labels[1]}`;
      const preview = `${labels[0]}, ${labels[1]}`;
      return preview.length <= 24
        ? `${preview} +${labels.length - 2}`
        : `${pluralize(labels.length, singularLabel, pluralLabel)} selected`;
    }

    function updateMultiSelectTrigger(trigger, options, selectedValues, emptyLabel, itemLabel, formatOptionLabel = null) {
      const selected = options.filter((option) => selectedValues.has(option.value));
      if (!selected.length) {
        setMultiSelectTriggerLabel(trigger, emptyLabel, emptyLabel);
        return;
      }
      const labels = selected.map((option) => formatOptionLabel ? formatOptionLabel(option) : option.label);
      const summary = summarizeSelectionLabels(labels, itemLabel);
      setMultiSelectTriggerLabel(trigger, summary, labels.join(", "));
    }

    function compactStateTriggerLabel(option) {
      return option.value === BLANK_STATE_VALUE ? "blank" : option.value;
    }

    function updateStateTrigger(trigger, options, selectedValues) {
      const selected = options.filter((option) => selectedValues.has(option.value));
      if (!selected.length) {
        setMultiSelectTriggerLabel(trigger, "Any state", "Any state");
        return;
      }
      const labels = selected.map(compactStateTriggerLabel);
      const includesBlank = labels.includes("blank");
      if (includesBlank) {
        const stateCount = labels.length - 1;
        const summary = stateCount > 0
          ? `${pluralize(stateCount, "state")} + blank`
          : "blank state";
        setMultiSelectTriggerLabel(trigger, summary, labels.join(", "));
        return;
      }
      const summary = summarizeSelectionLabels(labels, "state");
      setMultiSelectTriggerLabel(trigger, summary, labels.join(", "));
    }

    function multiSelectSearchText(option) {
      return `${String(option.value || "").trim()} ${String(option.label || "").trim()}`.trim().toLowerCase();
    }

    function defaultMultiSelectMatcher(option, query) {
      return multiSelectSearchText(option).includes(query);
    }

    function chapterMultiSelectMatcher(option, query) {
      const normalizedQuery = String(query || "").trim().toLowerCase();
      if (!normalizedQuery) return true;
      if (option.value === BLANK_CHAPTER_VALUE) {
        return "blank missing empty no chapter unknown".includes(normalizedQuery);
      }
      const code = String(option.value || "").trim().toLowerCase();
      const label = String(option.label || "").trim().toLowerCase();
      return code.includes(normalizedQuery) || label.includes(normalizedQuery);
    }

    function stateMultiSelectMatcher(option, query) {
      const normalizedQuery = String(query || "").trim().toLowerCase();
      if (!normalizedQuery) return true;
      if (option.value === BLANK_STATE_VALUE) {
        return "blank missing empty no state unknown".includes(normalizedQuery);
      }
      const code = String(option.value || "").trim().toLowerCase();
      const label = String(option.label || "").trim();
      const separatorIndex = label.indexOf(" - ");
      const stateName = (separatorIndex >= 0 ? label.slice(separatorIndex + 3) : label).trim().toLowerCase();
      if (normalizedQuery.length <= 2 && code.startsWith(normalizedQuery)) {
        return true;
      }
      return stateName.startsWith(normalizedQuery);
    }

    function findStateTypedSelectionMatch(options, query, matchOption = stateMultiSelectMatcher) {
      const normalizedQuery = String(query || "").trim().toLowerCase();
      if (!normalizedQuery) return null;
      if (normalizedQuery === "blank") {
        return options.find((option) => option.value === BLANK_STATE_VALUE) || null;
      }
      if (normalizedQuery.length === 2) {
        return options.find((option) => String(option.value || "").trim().toLowerCase() === normalizedQuery) || null;
      }
      if (normalizedQuery.length === 1) {
        const matches = options.filter((option) => matchOption(option, normalizedQuery));
        return matches.length === 1 ? matches[0] : null;
      }
      return null;
    }

    function applyMultiSelectFilter(menu, query, matchOption = defaultMultiSelectMatcher) {
      const normalizedQuery = String(query || "").trim().toLowerCase();
      menu.querySelectorAll(".multi-select-option").forEach((optionElement) => {
        const optionIndex = Number(optionElement.dataset.optionIndex);
        const option = Number.isInteger(optionIndex) ? menu._multiSelectOptions?.[optionIndex] : null;
        const matches = !normalizedQuery || (option && matchOption(option, normalizedQuery));
        optionElement.classList.toggle("hidden", !matches);
      });
    }

    function getTournamentStateBaseOptions() {
      return state.filterOptions.tournament_states?.length ? state.filterOptions.tournament_states : state.filterOptions.states;
    }

    function getTournamentCityBaseOptions() {
      return state.filterOptions.tournament_cities?.length ? state.filterOptions.tournament_cities : state.filterOptions.cities;
    }

    function getFilteredTournamentStateOptions() {
      const baseOptions = getTournamentStateBaseOptions();
      const selectedCityValues = [...selectedCities];
      if (!selectedCityValues.length) return baseOptions;
      const allowedStates = new Set(
        (state.filterOptions.tournament_locations || [])
          .filter((location) => selectedCities.has(location.city))
          .map((location) => location.state)
      );
      return baseOptions.filter((option) => allowedStates.has(option.value));
    }

    function getFilteredTournamentCityOptions() {
      const baseOptions = getTournamentCityBaseOptions();
      const selectedStateValues = [...selectedStates];
      if (!selectedStateValues.length) return baseOptions;
      const allowedCities = new Set(
        (state.filterOptions.tournament_locations || [])
          .filter((location) => selectedStates.has(location.state))
          .map((location) => location.city)
      );
      return baseOptions.filter((option) => allowedCities.has(option.value));
    }

    function findTypedMultiSelectMatch(options, query, matchOption = defaultMultiSelectMatcher) {
      const normalizedQuery = String(query || "").trim().toLowerCase();
      if (!normalizedQuery) return null;
      return options.find((option) => String(option.value || "").trim().toLowerCase() === normalizedQuery)
        || options.find((option) => String(option.label || "").trim().toLowerCase() === normalizedQuery)
        || options.find((option) => matchOption(option, normalizedQuery))
        || null;
    }

    function renderMultiSelectMenu(menu, options, selectedValues, onChange, searchPlaceholder = "Type to filter or select", matchOption = defaultMultiSelectMatcher, findTypedMatch = null) {
      const searchValue = "";
      const selectedCount = options.filter((option) => selectedValues.has(option.value)).length;
      menu._multiSelectOptions = options;
      menu._multiSelectMatchOption = matchOption;
      menu.innerHTML = `
        <div class="multi-select-search">
          <input type="text" class="multi-select-search-input" placeholder="${escapeHtml(searchPlaceholder)}" value="${escapeHtml(searchValue)}" />
        </div>
        <div class="multi-select-options">
          ${options.map((option, index) => `
            <label class="multi-select-option" data-option-index="${index}">
              <input type="checkbox" value="${escapeHtml(option.value)}" ${selectedValues.has(option.value) ? "checked" : ""} />
              <span>${escapeHtml(option.label)}</span>
            </label>
          `).join("")}
        </div>
        <div class="multi-select-footer">
          <div class="multi-select-selection-note">${selectedCount ? `${pluralize(selectedCount, "option")} selected` : "No filters selected"}</div>
          <button type="button" class="multi-select-clear" ${selectedCount ? "" : "disabled"}>Clear</button>
        </div>
      `;
      menu.querySelectorAll("input[type='checkbox']").forEach((input) => {
        input.addEventListener("change", () => {
          if (input.checked) {
            selectedValues.add(input.value);
          } else {
            selectedValues.delete(input.value);
          }
          onChange();
        });
      });
      const clearButton = menu.querySelector(".multi-select-clear");
      if (clearButton) {
        clearButton.addEventListener("click", (event) => {
          event.stopPropagation();
          selectedValues.clear();
          onChange();
          renderMultiSelectMenu(menu, options, selectedValues, onChange, searchPlaceholder, matchOption, findTypedMatch);
          const refreshedSearchInput = menu.querySelector(".multi-select-search-input");
          if (refreshedSearchInput) {
            refreshedSearchInput.focus();
          }
        });
      }
      const searchInput = menu.querySelector(".multi-select-search-input");
      searchInput.addEventListener("click", (event) => {
        event.stopPropagation();
      });
      searchInput.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          event.preventDefault();
          closeMultiSelectMenu(menu);
          return;
        }
        if (event.key === "Enter") {
          event.preventDefault();
          const match = findTypedMatch
            ? findTypedMatch(options, searchInput.value, matchOption)
            : findTypedMultiSelectMatch(options, searchInput.value, matchOption);
          if (!match) return;
          selectedValues.add(match.value);
          onChange();
          renderMultiSelectMenu(menu, options, selectedValues, onChange, searchPlaceholder, matchOption, findTypedMatch);
          const refreshedSearchInput = menu.querySelector(".multi-select-search-input");
          if (refreshedSearchInput) {
            refreshedSearchInput.focus();
            refreshedSearchInput.select();
          }
        }
      });
      searchInput.addEventListener("input", () => {
        if (searchInput.value.trim()) {
          clearAgaidFilter();
        }
        applyMultiSelectFilter(menu, searchInput.value, matchOption);
      });
      menu.querySelectorAll("input[type='checkbox']").forEach((input) => {
        input.addEventListener("keydown", (event) => {
          if (event.key === "Escape") {
            event.preventDefault();
            closeMultiSelectMenu(menu);
          }
        });
      });
      applyMultiSelectFilter(menu, searchValue, matchOption);
    }

    function updateRatingBandTrigger() {
      const selectedLabels = ratingBandOptions
        .filter((option) => selectedRatingBands.has(option.value))
        .map((option) => option.label);
      if (!selectedLabels.length) {

    function closeMultiSelectMenu(menu) {
      if (!menu) return;
      menu.classList.add("hidden");
      clearMultiSelectSearch(menu);
      const trigger = menu.previousElementSibling;
      if (trigger?.classList?.contains("multi-select-trigger")) {
        trigger.classList.remove("active");
        trigger.setAttribute("aria-expanded", "false");
      }
    }

    function openMultiSelectMenu(trigger, menu) {
      [
        [els.chapterTrigger, els.chapterMenu],
        [els.stateTrigger, els.stateMenu],
        [els.memberTypeTrigger, els.memberTypeMenu],
        [els.cityTrigger, els.cityMenu],
        [els.ratingBandTrigger, els.ratingBandMenu]
      ].forEach(([, otherMenu]) => {
        if (otherMenu !== menu) {
          closeMultiSelectMenu(otherMenu);
        }
      });
      const shouldOpen = menu.classList.contains("hidden");
      if (!shouldOpen) {
        closeMultiSelectMenu(menu);
        return false;
      }
      menu.classList.remove("hidden");
      menu.classList.toggle("align-right", window.innerWidth > 760 && trigger.getBoundingClientRect().left > window.innerWidth / 2);
      trigger.classList.add("active");
      trigger.setAttribute("aria-expanded", "true");
      clearMultiSelectSearch(menu);
      return true;
    }

    function closeAllMultiSelectMenus() {
      [els.chapterMenu, els.stateMenu, els.memberTypeMenu, els.cityMenu, els.ratingBandMenu].forEach(closeMultiSelectMenu);
    }


    function normalizeRoundValue(value) {
      const text = String(value ?? "").trim();
      if (!text) return { label: "?", sort: Number.MAX_SAFE_INTEGER };
      const numeric = Number(text);
      return Number.isFinite(numeric) ? { label: text, sort: numeric } : { label: text, sort: Number.MAX_SAFE_INTEGER - 1 };
    }

    function outcomeForPlayer(game, playerKey) {
      const result = String(game.result_text || "").trim().toUpperCase();
      const color = String(game[playerKey]?.color || "").trim().toUpperCase();
      if (!result || !color) return "?";
      const winnerColor = result.startsWith("B") ? "B" : (result.startsWith("W") ? "W" : "");
      if (!winnerColor) return "?";
      return color === winnerColor ? "W" : "L";
    }

    function handicapLabel(value) {
      const numeric = Number(value);
      if (Number.isFinite(numeric)) return String(numeric);
      const text = String(value ?? "").trim();
      return text || "0";
    }

    function crossTabTokenHtml(game, playerKey) {
      const round = normalizeRoundValue(game.round).label;
      const outcome = outcomeForPlayer(game, playerKey);
      const outcomeLabel = outcome === "W" ? "Win" : (outcome === "L" ? "Loss" : "Result");
      const color = String(game[playerKey]?.color || "").trim().toUpperCase() || "?";
      const label = `${outcomeLabel} as ${color} Hcp ${handicapLabel(game.handicap)}`;
      const title = `Round ${round} | ${game.result_text || "Unknown result"}${game.handicap ? ` | H${game.handicap}` : ""}${game.komi ? ` | K${game.komi}` : ""}`;
      const viewerUrl = gameSgfViewerUrl(game);
      if (gameHasSgf(game) && viewerUrl) {
        return `<button type="button" class="crosstab-token crosstab-outcome sgf-link" data-game-id="${escapeHtml(game.game_id)}" title="${escapeHtml(title)}" data-sgf-viewer-url="${escapeHtml(viewerUrl)}">${escapeHtml(label)}</button>`;
      }
      return `<span class="crosstab-token crosstab-outcome" title="${escapeHtml(title)}">${escapeHtml(label)}</span>`;
    }

    function rankStrength(rank) {
      const text = String(rank || "").trim().toLowerCase();
      const match = text.match(/^(\d+)\s*([dkp])$/);
      if (!match) return Number.NEGATIVE_INFINITY;
      const value = Number(match[1]);
      const kind = match[2];
      if (kind === "d") return 100 + value;
      if (kind === "k") return 100 - value;
      if (kind === "p") return 200 + value;
      return Number.NEGATIVE_INFINITY;
    }

    function roundKey(round) {
      const normalized = normalizeRoundValue(round);
      return `${String(normalized.sort).padStart(16, "0")}|${normalized.label}`;
    }

    function lastNameOnly(player) {
      const lastName = String(player?.last_name || "").trim();
      if (lastName) return lastName;
      const display = String(player?.display_name || "").trim();
      if (!display) return "Unknown";
      const parts = display.split(/\s+/).filter(Boolean);
      return parts.length > 1 ? parts[parts.length - 1] : display;
    }

    function cellGameHtml(game, playerKey, opponentKey, playerNumbers) {
      const opponent = game[opponentKey] || {};
      const opponentNumber = playerNumbers.get(String(opponent.agaid || "")) || "?";
      const opponentLabel = `vs ${opponentNumber} ${lastNameOnly(opponent)}`;
      return `<div class="crosstab-cell">${crossTabTokenHtml(game, playerKey)}<a href="#" class="crosstab-opponent" data-player-link="${escapeHtml(opponent.agaid)}">${escapeHtml(opponentLabel)}</a></div>`;
    }

    function renderTournamentCrossTab(participants, games) {
      if (!participants.length) {
        return '<div class="empty">No participant rows were derived from games for this tournament.</div>';
      }
      const participantMap = new Map(participants.map((item) => [String(item.agaid), { ...item, strongest_rank: "", wins: 0, losses: 0 }]));
      const rounds = [];
      const roundSeen = new Set();
      const cellMap = new Map();
      (games || []).forEach((game) => {
        const p1 = String(game.player_1?.agaid || "");
        const p2 = String(game.player_2?.agaid || "");
        const roundLabel = normalizeRoundValue(game.round).label;
        const rKey = roundKey(game.round);
        if (!roundSeen.has(rKey)) {
          roundSeen.add(rKey);
          rounds.push({ key: rKey, label: roundLabel, sort: normalizeRoundValue(game.round).sort });
        }
        if (participantMap.has(p1)) {
          const entryRank = String(game.player_1?.entry_rank || "").trim();
          const current = participantMap.get(p1);
          if (rankStrength(entryRank) > rankStrength(current.strongest_rank)) current.strongest_rank = entryRank;
          const outcome = outcomeForPlayer(game, "player_1");
          if (outcome === "W") current.wins += 1;
          if (outcome === "L") current.losses += 1;
        }
        if (participantMap.has(p2)) {
          const entryRank = String(game.player_2?.entry_rank || "").trim();
          const current = participantMap.get(p2);
          if (rankStrength(entryRank) > rankStrength(current.strongest_rank)) current.strongest_rank = entryRank;
          const outcome = outcomeForPlayer(game, "player_2");
          if (outcome === "W") current.wins += 1;
          if (outcome === "L") current.losses += 1;
        }
      });
      rounds.sort((a, b) => a.sort - b.sort || a.label.localeCompare(b.label));
      const orderedParticipants = [...participantMap.values()].sort((a, b) => {
        const rankDiff = rankStrength(b.strongest_rank) - rankStrength(a.strongest_rank);
        if (rankDiff !== 0) return rankDiff;
        const winDiff = Number(b.wins || 0) - Number(a.wins || 0);
        if (winDiff !== 0) return winDiff;
        const lossDiff = Number(a.losses || 0) - Number(b.losses || 0);
        if (lossDiff !== 0) return lossDiff;
        const byeDiff = (rounds.length - (Number(a.wins || 0) + Number(a.losses || 0)))
          - (rounds.length - (Number(b.wins || 0) + Number(b.losses || 0)));
        if (byeDiff !== 0) return byeDiff;
        return String(a.display_name || "").localeCompare(String(b.display_name || ""));
      });
      const playerNumbers = new Map(orderedParticipants.map((player, index) => [String(player.agaid), index + 1]));
      (games || []).forEach((game) => {
        const rKey = roundKey(game.round);
        const p1 = String(game.player_1?.agaid || "");
        const p2 = String(game.player_2?.agaid || "");
        if (participantMap.has(p1)) {
          const key = `${p1}|${rKey}`;
          if (!cellMap.has(key)) cellMap.set(key, []);
          cellMap.get(key).push({ html: cellGameHtml(game, "player_1", "player_2", playerNumbers), sort: String(game.game_id || "") });
        }
        if (participantMap.has(p2)) {
          const key = `${p2}|${rKey}`;
          if (!cellMap.has(key)) cellMap.set(key, []);
          cellMap.get(key).push({ html: cellGameHtml(game, "player_2", "player_1", playerNumbers), sort: String(game.game_id || "") });
        }
      });
      const headerCells = rounds.map((item) => `<th class="sticky-row">R${escapeHtml(item.label)}</th>`).join("");
      const bodyRows = orderedParticipants.map((rowPlayer, rowIndex) => {
        const byeCount = Math.max(rounds.length - (rowPlayer.wins + rowPlayer.losses), 0);
        const record = `${rowPlayer.wins}-${rowPlayer.losses}-${byeCount}`;
        const chapterBits = [`AGAID ${rowPlayer.agaid}`];
        if (rowPlayer.state) chapterBits.push(rowPlayer.state);
        if (rowPlayer.chapter_code) chapterBits.push(rowPlayer.chapter_code);
        const cells = rounds.map((round) => {
          const key = `${rowPlayer.agaid}|${round.key}`;
          const gamesHtml = (cellMap.get(key) || [])
            .filter((entry) => entry.html)
            .sort((a, b) => a.sort.localeCompare(b.sort))
            .map((entry) => entry.html);
          return `<td>${gamesHtml.length ? `<div class="crosstab-games">${gamesHtml.join("")}</div>` : '<span class="crosstab-empty">bye</span>'}</td>`;
        }).join("");
        const rankBadge = rowPlayer.strongest_rank ? `<span class="crosstab-rank">${escapeHtml(rowPlayer.strongest_rank)}</span>` : "";
        return `<tr><th class="sticky-col"><a href="#" class="crosstab-player" data-player-link="${escapeHtml(rowPlayer.agaid)}"><span class="crosstab-player-main"><span class="crosstab-player-number">${rowIndex + 1}</span><span class="crosstab-player-name">${escapeHtml(rowPlayer.display_name)}</span>${rankBadge}<span>${escapeHtml(record)}</span></span></a><span class="crosstab-meta">${escapeHtml(chapterBits.join(" | "))}</span></th>${cells}</tr>`;
      }).join("");
      return `<div class="crosstab-wrap"><table class="crosstab"><thead><tr><th class="sticky-corner">Player</th>${headerCells}</tr></thead><tbody>${bodyRows}</tbody></table></div>`;
    }

    function setActiveSelection(value, type) {
      document.querySelectorAll(".result-card").forEach((node) => {
        const playerMatch = type === "player" && node.dataset.playerAgaid === String(value);
        const tournamentMatch = type === "tournament" && node.dataset.tournamentCode === String(value);

    async function search() {
      if (state.searchBusy) return;
      const controller = beginRequest("search");
      cancelRequest("player");
      cancelRequest("tournament");
      cancelRequest("playerContext");
      setSearchBusy(true);
      updateModeUi();
      const params = currentSearchParams();
      setStatus(`Loading ${state.mode}...`);
      const path = state.mode === "players" ? "/api/ratings-explorer/players" : "/api/ratings-explorer/tournaments";
      try {
        const payload = await loadJson(path, params, { signal: controller.signal });
        state.results = payload.results || [];
        state.selected = null;
        state.selectedType = null;
        renderResults();
        updateLayoutMode();
        els.detail.innerHTML = `<div class="empty">${state.mode === "players" ? "Choose a player" : "Choose a tournament"} to open the full detail view.</div>`;
        els.context.innerHTML = '<div class="empty">Pick a player or tournament to reveal related context.</div>';
        els.resultCount.textContent = `${state.results.length} result${state.results.length === 1 ? "" : "s"}`;
        const debug = payload._debug || {};
        const timingLabel = Number.isFinite(Number(debug.elapsed_ms)) ? ` in ${Number(debug.elapsed_ms).toFixed(1)} ms` : "";
        const sourceLabel = debug.data_source ? ` from ${String(debug.data_source).replaceAll("_", " ")}` : "";
        setStatus(state.results.length ? `Showing ${state.results.length} ${state.mode}${sourceLabel}${timingLabel}.` : `No ${state.mode} matched those filters${sourceLabel}${timingLabel}.`);
        if (state.results.length === 1) {
          if (state.mode === "players") {
            setStatus(`Opening the matching player...`);
            loadPlayer(state.results[0].agaid).catch(handleError);
          } else {
            setStatus(`Opening the matching tournament...`);
            loadTournament(state.results[0].tournament_code).catch(handleError);
          }
        }
      } finally {
        setSearchBusy(false);
        endRequest("search", controller);
      }
    }

    async function loadSnapshotStatus() {
      try {
        const payload = await loadJson("/api/ratings-explorer/snapshot-status");
        const meta = payload.meta || {};
        const generatedAt = meta.generated_at;
        if (payload.snapshot_available && generatedAt) {
          setSnapshotBadge(`Snapshot generated ${formatDateTime(generatedAt)}`);
          return;
        }
        if (payload.snapshot_available) {
          setSnapshotBadge("Snapshot available");
          return;
        }
        const detail = payload.job_status && payload.job_status.detail ? payload.job_status.detail : "Snapshot not built yet";
        setSnapshotBadge(detail, { emphasize: true });
      } catch (error) {
        setSnapshotBadge("Snapshot freshness unavailable");
      }
    }

      if (state.filterOptionsLoadingPromise) return state.filterOptionsLoadingPromise;
      state.filterOptionsLoadingPromise = (async () => {
        const payload = await loadJson("/api/ratings-explorer/filter-options");
        state.filterOptions = {
          chapters: payload.chapters || [],
          states: payload.states || [],
          cities: payload.cities || [],
          member_types: payload.member_types || [],
          tournament_states: payload.tournament_states || payload.states || [],
          tournament_cities: payload.tournament_cities || payload.cities || [],
          tournament_locations: payload.tournament_locations || []
        };
        renderMultiSelectMenu(els.chapterMenu, state.filterOptions.chapters, selectedChapters, () => {
          clearAgaidFilter();
          updateMultiSelectTrigger(els.chapterTrigger, state.filterOptions.chapters, selectedChapters, "Any chapter", "chapters", compactChapterTriggerLabel);
        }, "Type chapter code or name", chapterMultiSelectMatcher);
        updateMultiSelectTrigger(els.chapterTrigger, state.filterOptions.chapters, selectedChapters, "Any chapter", "chapters", compactChapterTriggerLabel);
        renderStateMenu();
        renderMultiSelectMenu(els.memberTypeMenu, state.filterOptions.member_types, selectedMemberTypes, () => {
          clearAgaidFilter();
          updateMultiSelectTrigger(els.memberTypeTrigger, state.filterOptions.member_types, selectedMemberTypes, "Any member type", "member types");
        }, "Type member type");
        updateMultiSelectTrigger(els.memberTypeTrigger, state.filterOptions.member_types, selectedMemberTypes, "Any member type", "member types");
        renderCityMenu();
        state.filterOptionsLoaded = true;
        return state.filterOptions;
      })();
      try {
        return await state.filterOptionsLoadingPromise;
      } finally {
        state.filterOptionsLoadingPromise = null;

    function syncTournamentDateFields(changedField) {
      const dateFrom = els.fields.date_from.value;
      const dateBefore = els.fields.date_before.value;
      if (changedField === "date_from") {
        if (dateFrom && (!dateBefore || dateFrom > dateBefore)) {
          els.fields.date_before.value = dateFrom;
        }
        return;
      }
      if (changedField === "date_before") {
        if (dateBefore && (!dateFrom || dateBefore < dateFrom)) {
          els.fields.date_from.value = dateBefore;
        }
      }
    }

    function renderPlayerContext(newsArticles, reviewVideos) {
      const rows = [
        ...newsArticles.slice(0, 7).map((item) => `<div class="context-row"><div class="context-kind">AGA E-Journal article</div><div class="context-main"><a href="${escapeHtml(item.article_link)}" class="linkish" target="_blank" rel="noopener noreferrer">${escapeHtml(item.article_title)}</a></div><div class="context-meta">${formatDate(item.journal_date)}</div></div>`),
        ...reviewVideos.slice(0, 7).map((item) => `<div class="context-row"><div class="context-kind">NAOL review video</div><div class="context-main"><a href="${escapeHtml(item.video_link)}" class="linkish" target="_blank" rel="noopener noreferrer">${escapeHtml(item.context_label)}</a></div><div class="context-meta">${formatDate(item.journal_date)}${item.review_count ? ` | game ${escapeHtml(item.game_order || "?")} of ${escapeHtml(item.review_count)} ${item.review_count === 1 ? "review" : "reviews"}` : ""}</div></div>`)

    function renderPlayerContextCard(contentHtml, hidden = false) {
      return `<section class="detail-card mobile-secondary${hidden ? " hidden" : ""}" id="player-context-card"><div class="section-head"><div><h3>Context</h3><div class="eyebrow">AGA E-Journal articles and NAOL review videos related to this player</div></div></div><div id="player-context-content">${contentHtml}</div></section>`;
    }

    async function loadPlayerContext(agaid, requestId) {
      const controller = beginRequest("playerContext");
      try {
        const payload = await loadJson("/api/ratings-explorer/player-context", { agaid }, { signal: controller.signal });
        if (state.playerContextRequestId !== requestId || state.selectedType !== "player" || String(state.selected) !== String(agaid)) return;
        const contextHtml = renderPlayerContext(payload.news_articles || [], payload.review_videos || []);
        const target = document.getElementById("player-context-content");
        if (!target) return;
        const card = document.getElementById("player-context-card");
        if (!contextHtml) {
          if (card) card.classList.add("hidden");
          target.innerHTML = "";
          return;
        }
        target.innerHTML = contextHtml;
        if (card) card.classList.remove("hidden");
      } catch (error) {
        if (isAbortError(error)) return;
        if (state.playerContextRequestId !== requestId || state.selectedType !== "player" || String(state.selected) !== String(agaid)) return;
        const target = document.getElementById("player-context-content");
        const card = document.getElementById("player-context-card");
        if (!target) return;
        target.innerHTML = '<div class="empty">Player context is temporarily unavailable.</div>';
        if (card) card.classList.remove("hidden");
      } finally {
        endRequest("playerContext", controller);
      }
    }

    function renderResults() {
      if (!state.results.length) {
        els.results.innerHTML = '<div class="empty">No matches yet. Try broadening the filters or switching modes.</div>';
        return;
      }
      els.results.innerHTML = "";
      state.results.forEach((item) => {
        const card = document.createElement("article");
        card.className = "result-card";
        if (state.mode === "players") {
          card.dataset.playerAgaid = String(item.agaid ?? "");
        } else {
          card.dataset.tournamentCode = String(item.tournament_code ?? "");
        }
        card.innerHTML = state.mode === "players" ? playerResultHtml(item) : tournamentResultHtml(item);
        if (state.mode === "tournaments" && state.selectedType === "tournament" && String(state.selected) === String(item.tournament_code)) {
          card.classList.add("focused-tournament-card");
        }
        card.addEventListener("click", () => {
          if (state.mode === "players") {
            loadPlayer(item.agaid, { focusResult: false });
          } else {
            loadTournament(item.tournament_code, { focusResult: false });
          }
        });
        els.results.appendChild(card);
      });
    }

    function gameSgfViewerUrl(game) {
      if (!game) return "";
      const explicitUrl = String(game.sgf_viewer_url || "").trim();
      if (explicitUrl) return explicitUrl;
      const hasSgf = Boolean(game.has_sgf || String(game.sgf_code || "").trim());
      return hasSgf && game.game_id ? `/api/ratings-explorer/game-sgf-viewer?game_id=${encodeURIComponent(String(game.game_id))}` : "";
    }

    function gameHasSgf(game) {
      if (!game) return false;
      return Boolean(game.has_sgf || String(game.sgf_code || "").trim());
    }

    function filteredPlayerRecentGames(games) {
      const items = games || [];
      return state.playerRecentGamesSgfOnly ? items.filter((item) => gameHasSgf(item)) : items;
    }

    function sgfViewerTitle(game) {
      if (!game) return "SGF Viewer";
      let player1 = game.player_1?.display_name || game.player_name || game.member_name || "";
      let player2 = game.player_2?.display_name || game.opponent_name || "";
      let rank1 = String(game.player_1?.entry_rank || "").trim();
      let rank2 = String(game.player_2?.entry_rank || "").trim();
      let color1 = String(game.player_1?.color || "").trim().toUpperCase();
      let color2 = String(game.player_2?.color || "").trim().toUpperCase();
      if ((!player1 || !player2) && game.opponent_name) {
        player1 = game.opponent_name || player1;
        player2 = state.currentPlayerName || game.player_name || game.member_name || `AGAID ${state.selected || "?"}`;
        rank1 = String(game.opponent_rank || "").trim();
        rank2 = String(game.player_rank || "").trim();
        color2 = String(game.color || "").trim().toUpperCase();
        color1 = color2 === "B" ? "W" : color2 === "W" ? "B" : "";
      }
      player1 = player1 || `AGAID ${game.player_1?.agaid || game.opponent_agaid || "?"}`;
      player2 = player2 || `AGAID ${game.player_2?.agaid || state.selected || "?"}`;
      const player1Label = playerLabelWithRank(player1, rank1, color1);
      const player2Label = playerLabelWithRank(player2, rank2, color2);
      const handicapValue = Number(game.handicap);
      return [
        `${player1Label} vs ${player2Label}`,
        game.game_date ? formatDate(game.game_date) : "",
        game.round ? `Rnd ${game.round}` : "",
        Number.isFinite(handicapValue) ? `Hcp ${handicapValue}` : ""
      ].filter(Boolean).join(" | ");
    }

    function renderSgfViewerContent(selectedGame) {
      const viewerUrl = gameSgfViewerUrl(selectedGame);
      if (!selectedGame || !viewerUrl) {
        return `<div class="empty">Choose a game with SGF to load it here.</div>`;
      }
      return `<iframe class="sgf-viewer-frame" src="${escapeHtml(viewerUrl)}" loading="lazy" title="SGF viewer"></iframe>`;
    }

    function closeSgfViewer() {
      els.sgfModal.classList.add("hidden");
      els.sgfModal.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
    }

    function syncSgfModal() {
      els.sgfModalTitle.textContent = sgfViewerTitle(state.selectedSgfGame);
      els.sgfModalSubtitle.textContent = "";
      els.sgfModalBody.innerHTML = renderSgfViewerContent(state.selectedSgfGame);

      state.selectedSgfGame = game;
