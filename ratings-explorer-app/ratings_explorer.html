    function wireLinks(root) {
      root.querySelectorAll("[data-player-link]").forEach((link) => {
        link.addEventListener("click", (event) => {
          event.preventDefault();
          const agaid = link.getAttribute("data-player-link");
          if (agaid) loadPlayer(agaid, { focusResult: true });
        });
      });
      root.querySelectorAll("[data-tournament-link]").forEach((link) => {
        link.addEventListener("click", (event) => {
          event.preventDefault();
          const code = link.getAttribute("data-tournament-link");
          if (code) loadTournament(code, { focusResult: true });
        });
      });
      root.querySelectorAll("[data-sgf-viewer-url]").forEach((link) => {
        link.addEventListener("click", (event) => {
          event.preventDefault();
          const gameId = link.getAttribute("data-game-id");
          const game = (state.activeGames || []).find((item) => String(item.game_id || "") === String(gameId || ""));
          if (game) openSgfViewer(game);
        });
      });
    }

    async function loadPlayer(agaid, options = {}) {
      const controller = beginRequest("player");
      cancelRequest("tournament");
      cancelRequest("playerContext");
      const { focusResult = false } = options;
      state.selected = agaid;
      state.selectedType = "player";
      setStatus(`Loading player ${agaid}...`);
      try {
        const payload = await loadJson("/api/ratings-explorer/player", {
          agaid,
          recent_games_sgf_only: state.playerRecentGamesSgfOnly ? "1" : ""
        }, { signal: controller.signal });
        const player = payload.player;
        state.currentPlayerName = player?.display_name || `AGAID ${agaid}`;
        state.currentTournamentDescription = "";
        const recentTournaments = payload.recent_tournaments || [];
        const opponents = payload.opponents || [];
        const recentGames = payload.recent_games || [];
        const sgfGames = recentGames.filter((item) => gameHasSgf(item));
        const visibleRecentGames = state.playerRecentGamesSgfOnly ? recentGames : filteredPlayerRecentGames(recentGames);
        const ratingHistory = payload.rating_history || [];
        state.activeGames = recentGames;
        state.selectedSgfGame = selectedSgfGameFromList(recentGames) || sgfGames[0] || null;
        const contextSection = renderPlayerContextCard("", true);
        const chartHtml = buildInteractiveHistoryChart(player, ratingHistory);
        const recentGamesTools = `<label class="inline-field" style="margin-left:auto"><input type="checkbox" id="recent-games-sgf-only"${state.playerRecentGamesSgfOnly ? " checked" : ""} /> <span>Games with SGF only?</span></label>`;
        focusSinglePlayerResult(player);
        updateLayoutMode();
        const host = document.createElement("div");
        host.className = "detail-grid";
        host.innerHTML = `<section class="detail-card"><div class="headline"><div><div class="title">${escapeHtml(player.display_name)}</div><div class="subtitle">AGAID ${escapeHtml(player.agaid)}${player.chapter_label ? ` | ${escapeHtml(player.chapter_label)}` : ""}${player.state ? ` | ${escapeHtml(player.state)}` : ""}${player.expiration_date ? ` | Expiration ${formatShortDate(player.expiration_date)}` : ""}</div></div></div><div class="metric-grid"><div class="metric"><div class="label">Current Rating</div><div class="value">${formatRating(player.rating)}</div></div><div class="metric"><div class="label">Sigma</div><div class="value">${formatRating(player.sigma)}</div></div><div class="metric"><div class="label">Tournaments</div><div class="value">${player.tournament_count || 0}</div></div><div class="metric"><div class="label">Games</div><div class="value">${player.game_count || 0}</div></div><div class="metric"><div class="label">Opponents</div><div class="value">${player.opponent_count || 0}</div></div><div class="metric"><div class="label">Wins</div><div class="value">${player.wins || 0}</div></div><div class="metric"><div class="label">Losses</div><div class="value">${player.losses || 0}</div></div><div class="metric"><div class="label">Latest Event</div><div class="value" style="font-size:1rem">${formatDate(player.latest_event_date)}</div></div></div></section>${contextSection}<section class="detail-card"><div class="section-head"><div><h3>Rating History</h3></div></div>${chartHtml}</section><section class="detail-card mobile-secondary"><div class="section-head"><div><h3>Recent Tournaments</h3><div class="eyebrow">Click any event to pivot into tournament detail</div></div></div>${recentTournaments.length ? scrollTableHtml(["Tournament", "Date", "Record", "Games"], recentTournaments.map((item) => `<tr><td><a href="#" class="linkish" data-tournament-link="${escapeHtml(item.tournament_code)}">${escapeHtml(item.description || item.tournament_code)}</a></td><td>${formatDate(item.tournament_date)}</td><td>${item.wins || 0}-${item.losses || 0}</td><td>${item.games_played || 0}</td></tr>`)) : '<div class="empty">No tournament history was found for this player.</div>'}</section><section class="detail-card"><div class="section-head"><div><h3>Recent Games</h3><div class="eyebrow">A game-by-game view with opponent and tournament links</div></div><div class="section-tools">${recentGamesTools}</div></div>${visibleRecentGames.length ? scrollTableHtml(["Date", "Opponent", "Tournament", "Rnd", "B/W", "Hcp", "W/L", "SGF"], visibleRecentGames.map((item) => `<tr><td>${formatDate(item.game_date)}</td><td><a href="#" class="linkish" data-player-link="${escapeHtml(item.opponent_agaid)}">${escapeHtml(item.opponent_name)}</a></td><td><a href="#" class="linkish" data-tournament-link="${escapeHtml(item.tournament_code)}">${escapeHtml(item.tournament_description || item.tournament_code)}</a></td><td>${escapeHtml(item.round || "")}</td><td>${escapeHtml(item.color || "")}</td><td>${escapeHtml(item.handicap ?? "")}</td><td>${escapeHtml(item.outcome || item.result_text || "")}</td><td>${gameHasSgf(item) && gameSgfViewerUrl(item) ? `<button type="button" class="sgf-link" data-game-id="${escapeHtml(item.game_id)}" data-sgf-viewer-url="${escapeHtml(gameSgfViewerUrl(item))}" title="${escapeHtml(item.sgf_code || "")}">View SGF</button>` : `<span class="sgf-link muted">None</span>`}</td></tr>`)) : `<div class="empty">${state.playerRecentGamesSgfOnly ? "No SGF-linked recent games were found for this player." : "No recent games were found for this player."}</div>`}</section><section class="detail-card mobile-secondary"><div class="section-head"><div><h3>Opponent Summary</h3><div class="eyebrow">Cross-link into any opponent from here</div></div></div>${opponents.length ? scrollTableHtml(["Opponent", "Games", "Record", "Latest"], opponents.map((item) => `<tr><td><a href="#" class="linkish" data-player-link="${escapeHtml(item.agaid)}">${escapeHtml(item.display_name)}</a></td><td>${item.games_played || 0}</td><td>${item.wins || 0}-${item.losses || 0}</td><td>${formatDate(item.latest_game_date)}</td></tr>`)) : '<div class="empty">No opponent detail is available for this player yet.</div>'}</section>`;
        els.detail.innerHTML = "";
        els.detail.appendChild(host);
        wireHistoryChart(host);
        wireLinks(host);
        host.querySelector("#recent-games-sgf-only")?.addEventListener("change", (event) => {
          state.playerRecentGamesSgfOnly = Boolean(event.target.checked);
          loadPlayer(agaid, { focusResult }).catch(handleError);
        });
        state.playerContextRequestId += 1;
        loadPlayerContext(agaid, state.playerContextRequestId).catch(() => {});
        els.context.innerHTML = '<div class="empty">Player context is now shown inside the detail view.</div>';
        const debug = payload._debug || {};
        const sourceLabel = payload.data_source ? ` from ${String(payload.data_source).replaceAll("_", " ")}` : "";
        const timingLabel = Number.isFinite(Number(debug.elapsed_ms)) ? ` in ${Number(debug.elapsed_ms).toFixed(1)} ms` : "";
        setStatus(`Loaded player ${player.display_name}${sourceLabel}${timingLabel}.`);
      } finally {
        endRequest("player", controller);
      }
    }

    async function loadTournament(tournamentCode, options = {}) {
      const controller = beginRequest("tournament");
      cancelRequest("player");
      cancelRequest("playerContext");
      const { focusResult = false } = options;
      state.selected = tournamentCode;
      state.selectedType = "tournament";
      setStatus(`Loading tournament ${tournamentCode}...`);
      try {
        const payload = await loadJson("/api/ratings-explorer/tournament", { tournament_code: tournamentCode }, { signal: controller.signal });
        const tournament = { ...(payload.tournament || {}) };
        state.currentTournamentDescription = tournament?.description || tournament?.tournament_code || "";
        state.playerContextRequestId += 1;
        const participants = payload.participants || [];
        const games = payload.games || [];
        tournament.game_count = games.length;
        const sgfGames = games.filter((item) => gameHasSgf(item));
        state.activeGames = games;
        state.selectedSgfGame = selectedSgfGameFromList(games) || sgfGames[0] || null;
        focusSingleTournamentResult(tournament);
        updateLayoutMode();
        const crossTab = renderTournamentCrossTab(participants, games);
        const host = document.createElement("div");
        host.className = "detail-grid";
        host.innerHTML = `<section class="detail-card"><div class="section-head"><div><h3>Cross-Tab</h3><div class="eyebrow">Built from tournament player and game data, with player links ready for deeper navigation. Click a result token when an SGF is linked to open it in the viewer.</div></div></div>${crossTab}</section>`;
        els.detail.innerHTML = "";
        els.detail.appendChild(host);
        wireLinks(host);
        els.context.innerHTML = '<div class="empty">Tournament mode hides the context panel so the cross-tab can use the full width.</div>';
        const debug = payload._debug || {};
        const sourceLabel = payload.data_source ? ` from ${String(payload.data_source).replaceAll("_", " ")}` : "";
        const timingLabel = Number.isFinite(Number(debug.elapsed_ms)) ? ` in ${Number(debug.elapsed_ms).toFixed(1)} ms` : "";
        setStatus(`Loaded tournament ${tournament.description || tournament.tournament_code}${sourceLabel}${timingLabel}.`);
      } finally {
        endRequest("tournament", controller);
      }
    }

    function handleError(error) {
      if (isAbortError(error)) return;
      console.error(error);
      setStatus(error.message || "Something went wrong.");
      els.detail.innerHTML = `<div class="empty">${escapeHtml(error.message || "Something went wrong.")}</div>`;
    }

    els.modeButtons.forEach((button) => {
      button.addEventListener("click", () => {
        if (state.mode !== button.dataset.mode) {
          selectedStates.clear();
        }
        state.mode = button.dataset.mode;
        renderStateMenu();
        renderCityMenu();
        search().catch(handleError);
      });
    });
    els.searchButton.addEventListener("click", () => {
      search().catch(handleError);
    });
    els.sgfModalClose.addEventListener("click", () => {
      closeSgfViewer();
    });
    els.sgfModal.addEventListener("click", (event) => {
      if (event.target === els.sgfModal) closeSgfViewer();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !els.sgfModal.classList.contains("hidden")) {
        closeSgfViewer();
      }
    });
    els.reset.addEventListener("click", () => {
      Object.values(els.fields).forEach((input) => { input.value = ""; });
      selectedChapters.clear();
      selectedStates.clear();
      selectedMemberTypes.clear();
      selectedCities.clear();
      els.fields.status_filter.value = "all";
      els.fields.recent_activity_years.value = "";
      selectedRatingBands.clear();
      renderMultiSelectMenu(els.chapterMenu, state.filterOptions.chapters, selectedChapters, () => {
        updateMultiSelectTrigger(els.chapterTrigger, state.filterOptions.chapters, selectedChapters, "Any chapter", "chapters", compactChapterTriggerLabel);
      }, "Type chapter code or name", chapterMultiSelectMatcher);
      updateMultiSelectTrigger(els.chapterTrigger, state.filterOptions.chapters, selectedChapters, "Any chapter", "chapters", compactChapterTriggerLabel);
      renderStateMenu();
      renderMultiSelectMenu(els.memberTypeMenu, state.filterOptions.member_types, selectedMemberTypes, () => {
        updateMultiSelectTrigger(els.memberTypeTrigger, state.filterOptions.member_types, selectedMemberTypes, "Any member type", "member types");
      }, "Type member type");
      updateMultiSelectTrigger(els.memberTypeTrigger, state.filterOptions.member_types, selectedMemberTypes, "Any member type", "member types");
      renderCityMenu();
      renderRatingBandOptions();
      els.fields.limit.value = "25";
      search().catch(handleError);
    });
    [
      [els.chapterTrigger, els.chapterMenu],
      [els.stateTrigger, els.stateMenu],
      [els.memberTypeTrigger, els.memberTypeMenu],
      [els.cityTrigger, els.cityMenu],
      [els.ratingBandTrigger, els.ratingBandMenu]
    ].forEach(([trigger, menu]) => {
      trigger.addEventListener("click", () => {
        const opened = openMultiSelectMenu(trigger, menu);
        if (!opened) return;
        const searchInput = menu.querySelector(".multi-select-search-input");
        if (searchInput) {
          searchInput.focus();
          searchInput.select();
        }
      });
      trigger.addEventListener("keydown", (event) => {
        if (event.key === "ArrowDown" || event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          const opened = openMultiSelectMenu(trigger, menu);
          if (!opened) return;
          const searchInput = menu.querySelector(".multi-select-search-input");
          if (searchInput) {
            searchInput.focus();
            searchInput.select();
          }
        } else if (event.key === "Escape") {
          event.preventDefault();
          closeMultiSelectMenu(menu);
        }
      });
    });
    document.addEventListener("click", (event) => {
      [
        [els.chapterMultiselect, els.chapterMenu],
        [els.stateMultiselect, els.stateMenu],
        [els.memberTypeMultiselect, els.memberTypeMenu],
        [els.cityMultiselect, els.cityMenu],
        [els.ratingBandMultiselect, els.ratingBandMenu]
      ].forEach(([host, menu]) => {
        if (!host.contains(event.target)) {
          closeMultiSelectMenu(menu);
        }
      });
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeAllMultiSelectMenus();
      }
    });
    [els.fields.first_name, els.fields.last_name, els.fields.description].forEach((input) => {
      input.addEventListener("input", () => {
        if (input.value.trim()) {
          clearAgaidFilter();
        }
      });
    });
    [els.fields.status_filter, els.fields.recent_activity_years, els.fields.date_from, els.fields.date_before].forEach((input) => {
      input.addEventListener("change", () => {
        const value = String(input.value || "").trim();
        const isDefaultStatus = input === els.fields.status_filter && value === "all";
        const isDefaultRecentActivity = input === els.fields.recent_activity_years && value === "";
        if (!value || isDefaultStatus || isDefaultRecentActivity) return;
        clearAgaidFilter();
      });
    });
    Object.values(els.fields).forEach((input) => {
      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          search().catch(handleError);
        }
      });
    });
    els.fields.date_from.addEventListener("change", () => {
      syncTournamentDateFields("date_from");
    });
    els.fields.date_before.addEventListener("change", () => {
      syncTournamentDateFields("date_before");
    });

    updateModeUi();
    renderRatingBandOptions();
    loadSnapshotStatus();
    loadStartupPlayers().catch(handleError);
  </script>
</body>
</html>
