<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BayRate Staging</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #18212f;
      --muted: #657386;
      --line: #d7dde5;
      --line-strong: #aeb8c6;
      --accent: #256f70;
      --accent-strong: #174e50;
      --accent-soft: #e5f1ef;
      --warn: #9b5b16;
      --warn-soft: #fff4df;
      --danger: #a33a3a;
      --danger-soft: #feecec;
      --ready: #1f7a4d;
      --ready-soft: #e7f5ed;
      --shadow: 0 12px 28px rgba(24, 33, 47, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    button, input, textarea {
      font: inherit;
    }

    select {
      font: inherit;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 10px;
      background: #fff;
      color: var(--ink);
    }

    button {
      border: 1px solid var(--line);
      border-radius: 6px;
      min-height: 36px;
      padding: 0 12px;
      background: var(--panel);
      color: var(--ink);
      cursor: pointer;
      font-weight: 700;
    }

    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    button.success {
      border-color: var(--ready);
      background: var(--ready);
      color: #fff;
    }

    button.danger {
      border-color: var(--danger);
      background: var(--danger);
      color: #fff;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.58;
    }

    .run-id-input {
      width: 104px;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 10px;
      background: #fff;
      color: var(--ink);
      font-weight: 700;
    }

    .workflow-panel {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .workflow-summary {
      display: grid;
      grid-template-columns: minmax(220px, 0.7fr) minmax(260px, 1.3fr);
      gap: 10px;
      align-items: stretch;
    }

    .workflow-status,
    .workflow-waiting {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfd;
      padding: 10px;
      display: grid;
      gap: 4px;
    }

    .workflow-label {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .workflow-main {
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .workflow-steps {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(105px, 1fr));
      gap: 8px;
    }

    .workflow-step {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfd;
      padding: 8px;
      min-height: 66px;
      display: grid;
      gap: 4px;
      align-content: start;
    }

    .workflow-step.done {
      border-color: #a7d7bb;
      background: var(--ready-soft);
    }

    .workflow-step.current {
      border-color: #e0a05a;
      background: var(--warn-soft);
      box-shadow: inset 0 0 0 2px rgba(155, 91, 22, 0.16);
    }

    .workflow-step.blocked {
      border-color: #efb1b1;
      background: var(--danger-soft);
    }

    .workflow-step-title {
      font-size: 0.84rem;
      font-weight: 800;
    }

    .workflow-step-state {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
    }

    .workflow-actions,
    .workflow-review {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .workflow-review {
      border-top: 1px solid var(--line);
      padding-top: 10px;
    }

    .workflow-review-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfd;
      padding: 6px 8px;
      max-width: 100%;
      flex-wrap: wrap;
    }

    .workflow-review-title {
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .page {
      width: min(1480px, 100%);
      margin: 0 auto;
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .topbar,
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .topbar {
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    h1, h2, h3, p {
      margin: 0;
    }

    h1 {
      font-size: clamp(1.55rem, 2.4vw, 2.25rem);
      letter-spacing: 0;
    }

    h2 {
      font-size: 1.05rem;
      letter-spacing: 0;
    }

    h3 {
      font-size: 0.96rem;
      letter-spacing: 0;
    }

    .muted {
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(320px, 0.86fr) minmax(420px, 1.14fr);
      gap: 14px;
      align-items: start;
    }

    .panel {
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .section-head,
    .row-actions,
    .metrics,
    .source-meta,
    .status-line {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .section-head {
      justify-content: space-between;
    }

    .dropzone {
      min-height: 132px;
      border: 2px dashed var(--line-strong);
      border-radius: 8px;
      background: #fbfcfd;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 18px;
      transition: border-color 120ms ease, background 120ms ease;
    }

    .dropzone.active {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .dropzone input {
      display: none;
    }

    .dropzone-title {
      font-weight: 800;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      min-height: 220px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfcfd;
      color: var(--ink);
      line-height: 1.35;
      white-space: pre;
      overflow: auto;
    }

    .source-list,
    .same-date-list,
    .preview-list,
    .message-list {
      display: grid;
      gap: 8px;
    }

    .source-card,
    .event-row,
    .preview-card,
    .message {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 10px;
    }

    .source-card {
      display: grid;
      gap: 8px;
    }

    .source-card.dragging,
    .event-row.dragging {
      opacity: 0.5;
    }

    .source-card.drop-target,
    .event-row.drop-target {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .source-title {
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .source-meta {
      color: var(--muted);
      font-size: 0.88rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      border: 1px solid var(--line);
      padding: 3px 8px;
      background: #fff;
      font-size: 0.82rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .status-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .status-label::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: currentColor;
      flex: 0 0 auto;
    }

    .status-label.ready {
      color: var(--ready);
    }

    .status-label.review {
      color: var(--warn);
    }

    .status-label.failed {
      color: var(--danger);
    }

    .same-date-group {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      display: grid;
      gap: 8px;
      background: #fbfcfd;
    }

    .event-row {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
    }

    .event-index {
      width: 28px;
      height: 28px;
      display: inline-grid;
      place-items: center;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-weight: 800;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(110px, 1fr));
      gap: 8px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fbfcfd;
    }

    .metric-value {
      font-size: 1.3rem;
      font-weight: 800;
      margin-top: 4px;
    }

    .preview-card {
      display: grid;
      gap: 8px;
    }

    .preview-title {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: start;
      flex-wrap: wrap;
    }

    .metadata-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(150px, 1fr));
      gap: 8px;
      align-items: end;
    }

    .metadata-grid label,
    .host-chapter-row label {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 700;
    }

    .metadata-grid input:not([type="checkbox"]),
    .metadata-grid select,
    .host-chapter-row select,
    .host-chapter-row input:not([type="checkbox"]) {
      width: 100%;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 10px;
      background: #fff;
      color: var(--ink);
      font-weight: 600;
    }

    .metadata-wide {
      grid-column: span 2;
    }

    .host-chapter-row {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) minmax(160px, 1fr) minmax(180px, 1fr) auto auto;
      gap: 8px;
      align-items: end;
    }

    .checkbox-field {
      min-height: 36px;
      display: inline-flex;
      flex-direction: row !important;
      align-items: center;
      gap: 8px !important;
      white-space: nowrap;
      color: var(--ink) !important;
    }

    .checkbox-field input {
      width: 16px;
      height: 16px;
    }

    .message {
      border-color: #ecd09a;
      background: var(--warn-soft);
      color: #5f370b;
    }

    .message.highlight {
      border-color: #e3a05f;
      background: #fff0df;
      font-weight: 700;
    }

    .message.review {
      border-color: #e0a05a;
      background: #fff0df;
      border-left: 4px solid var(--warn);
      font-weight: 700;
    }

    .message.ready {
      border-color: #a7d7bb;
      background: var(--ready-soft);
      color: #155637;
    }

    .warning-title {
      display: block;
      margin-bottom: 3px;
      color: var(--ink);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .error {
      border: 1px solid #efb1b1;
      background: var(--danger-soft);
      color: var(--danger);
      border-radius: 8px;
      padding: 10px;
      font-weight: 700;
    }

    .empty {
      border: 1px dashed var(--line-strong);
      border-radius: 8px;
      padding: 14px;
      color: var(--muted);
      background: #fbfcfd;
    }

    .footer-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .run-banner {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fbfcfd;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    @media (max-width: 920px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .workflow-summary {
        grid-template-columns: 1fr;
      }

      .workflow-steps {
        grid-template-columns: repeat(2, minmax(130px, 1fr));
      }

      .metrics {
        grid-template-columns: repeat(2, minmax(120px, 1fr));
      }

      .host-chapter-row {
        grid-template-columns: 1fr;
      }

      .metadata-grid {
        grid-template-columns: 1fr;
      }

      .metadata-wide {
        grid-column: span 1;
      }
    }

    @media (max-width: 520px) {
      .page {
        padding: 10px;
      }

      .event-row {
        grid-template-columns: 30px minmax(0, 1fr);
      }

      .event-row .row-actions {
        grid-column: 1 / -1;
      }

      .metrics {
        grid-template-columns: 1fr;
      }

      .workflow-steps {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="topbar">
      <div>
        <h1>BayRate Staging</h1>
        <p class="muted">Reports to staging preview</p>
      </div>
      <div class="row-actions">
        <a href="/api/ratings-explorer"><button type="button">Ratings Explorer</button></a>
        <input id="runIdInput" class="run-id-input" type="number" min="1" step="1" placeholder="RunID" aria-label="RunID" />
        <button type="button" id="loadRunBtn">Load Run</button>
      </div>
    </header>

    <section class="workflow-panel" aria-live="polite">
      <div class="workflow-summary">
        <div class="workflow-status">
          <div class="workflow-label">Last action</div>
          <div id="workflowLastAction" class="workflow-main">No preview yet</div>
        </div>
        <div class="workflow-waiting">
          <div class="workflow-label">Waiting for</div>
          <div id="workflowWaiting" class="workflow-main">Add reports or load a RunID.</div>
          <div id="workflowWaitingDetail" class="muted"></div>
        </div>
      </div>
      <div id="workflowSteps" class="workflow-steps"></div>
      <div class="workflow-actions">
        <button type="button" id="previewBtn" class="primary">Preview Run</button>
        <button type="button" id="confirmRewardLinksBtn" disabled>Confirm Reward Links</button>
        <button type="button" id="stageBtn" class="success" disabled>Write Staged Run</button>
        <button type="button" id="replayBtn" disabled>Run Replay</button>
        <button type="button" id="commitPreviewBtn" data-action="commit-preview" disabled>Preview Production Commit</button>
        <button type="button" id="commitRunBtn" data-action="commit-run" class="danger" disabled>Commit to Production</button>
      </div>
      <div id="workflowReview" class="workflow-review"></div>
    </section>

    <section class="grid">
      <div class="panel">
        <div class="section-head">
          <h2>Report Intake</h2>
          <button type="button" id="clearAllBtn">Clear</button>
        </div>

        <div id="dropzone" class="dropzone" role="button" tabindex="0" aria-label="Drop report files or choose text report files">
          <input id="fileInput" type="file" accept=".txt,text/plain" multiple />
          <span>
            <span class="dropzone-title">Drop report files</span><br />
            <button type="button" id="chooseFilesBtn">Choose Files</button>
          </span>
        </div>

        <div>
          <div class="section-head">
            <h2>Paste Report</h2>
            <button type="button" id="addPasteBtn">Add Pasted Report</button>
          </div>
          <textarea id="pasteBox" spellcheck="false"></textarea>
        </div>

        <div>
          <div class="section-head">
            <h2>Source Reports</h2>
            <div class="row-actions">
              <span id="sourceCount" class="pill">0 reports</span>
              <button type="button" id="linkAllRewardsBtn" disabled>Link All Rewards</button>
            </div>
          </div>
          <div id="sourceList" class="source-list"></div>
          <datalist id="rewardGroupOptions"></datalist>
        </div>
      </div>

      <div class="panel">
        <div class="section-head">
          <h2>Same-Date Sequence</h2>
          <span class="muted">Applied before preview</span>
        </div>
        <div id="sameDateList" class="same-date-list"></div>
      </div>
    </section>

    <section class="panel">
      <div class="section-head">
        <h2>Preview</h2>
        <div class="status-line">
          <span id="previewStatus" class="muted">No preview yet</span>
        </div>
      </div>
      <div id="previewOutput" class="preview-list"></div>
    </section>
  </main>

  <script>
    const API_BASE = "__RATINGS_EXPLORER_API_BASE__";
    const STATE_OPTIONS = [
      "", "AL", "AK", "AZ", "AR", "CA", "CO", "CT", "DE", "DC", "FL", "GA",
      "HI", "ID", "IL", "IN", "IA", "KS", "KY", "LA", "ME", "MD", "MA", "MI",
      "MN", "MS", "MO", "MT", "NE", "NV", "NH", "NJ", "NM", "NY", "NC", "ND",
      "OH", "OK", "OR", "PA", "RI", "SC", "SD", "TN", "TX", "UT", "VT", "VA",
      "WA", "WV", "WI", "WY"
    ];
    const COUNTRY_OPTIONS = ["US", "CA", ""];
    const state = {
      reports: [],
      nextId: 1,
      nextSequence: 1,
      busy: false,
      dragId: null,
      dragTargetId: null,
      dropDepth: 0,
      previewPayload: null,
      stagedSummary: null,
      replaySummary: null,
      commitPreview: null,
      commitState: null,
      hostChapterOptions: [],
      metadataOptionsLoaded: false,
      rewardLinksConfirmed: false,
    };

    const els = {
      dropzone: document.getElementById("dropzone"),
      fileInput: document.getElementById("fileInput"),
      chooseFilesBtn: document.getElementById("chooseFilesBtn"),
      pasteBox: document.getElementById("pasteBox"),
      addPasteBtn: document.getElementById("addPasteBtn"),
      clearAllBtn: document.getElementById("clearAllBtn"),
      linkAllRewardsBtn: document.getElementById("linkAllRewardsBtn"),
      runIdInput: document.getElementById("runIdInput"),
      loadRunBtn: document.getElementById("loadRunBtn"),
      previewBtn: document.getElementById("previewBtn"),
      stageBtn: document.getElementById("stageBtn"),
      replayBtn: document.getElementById("replayBtn"),
      confirmRewardLinksBtn: document.getElementById("confirmRewardLinksBtn"),
      commitPreviewBtn: document.getElementById("commitPreviewBtn"),
      commitRunBtn: document.getElementById("commitRunBtn"),
      workflowLastAction: document.getElementById("workflowLastAction"),
      workflowWaiting: document.getElementById("workflowWaiting"),
      workflowWaitingDetail: document.getElementById("workflowWaitingDetail"),
      workflowSteps: document.getElementById("workflowSteps"),
      workflowReview: document.getElementById("workflowReview"),
      sourceCount: document.getElementById("sourceCount"),
      sourceList: document.getElementById("sourceList"),
      rewardGroupOptions: document.getElementById("rewardGroupOptions"),
      sameDateList: document.getElementById("sameDateList"),
      previewStatus: document.getElementById("previewStatus"),
      previewOutput: document.getElementById("previewOutput"),
    };

    function parseLocalReport(text, fallbackName) {
      const lines = String(text || "").split(/\r?\n/);
      let title = fallbackName || "Untitled report";
      for (let i = 0; i < lines.length; i += 1) {
        const match = lines[i].match(/^\s*(?:TOURNEY|TOURNAMENT)\b(.*)$/i);
        if (!match) continue;
        const inlineTitle = match[1].trim();
        if (inlineTitle) {
          title = inlineTitle;
        } else {
          const nextTitle = lines.slice(i + 1).map((line) => line.trim()).find(Boolean);
          if (nextTitle) title = nextTitle;
        }
        break;
      }
      const startMatch = String(text || "").match(/^\s*start\s*=\s*['"]?([^'"\r\n]+)/im);
      const eventDate = startMatch ? normalizeDate(startMatch[1].trim()) : "";
      const locationMatch = String(text || "").match(/^\s*location\s*=\s*([^'"\r\n]+)/im);
      const location = parseLocation(locationMatch ? locationMatch[1] : "");
      const gameMatch = String(text || "").match(/^\s*GAMES(?:\s+\d+|\s*\((\d+)\))?/gim);
      const playerMatch = String(text || "").match(/^\s*PLAYERS(?:\s*\((\d+)\))?/im);
      return {
        title,
        eventDate,
        city: location.city,
        stateCode: location.stateCode,
        countryCode: location.countryCode,
        playerCountHint: playerMatch && playerMatch[1] ? Number(playerMatch[1]) : null,
        gameSectionCount: gameMatch ? gameMatch.length : 0,
      };
    }

    function normalizeDate(value) {
      const text = String(value || "").trim();
      let match = text.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
      if (match) return `${match[1]}-${match[2].padStart(2, "0")}-${match[3].padStart(2, "0")}`;
      match = text.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
      if (match) return `${match[3]}-${match[1].padStart(2, "0")}-${match[2].padStart(2, "0")}`;
      return "";
    }

    function parseLocation(value) {
      const text = String(value || "").trim();
      if (!text) return { city: "", stateCode: "", countryCode: "US" };
      const parts = text.split(",").map((part) => part.trim()).filter(Boolean);
      const city = parts.length > 1 ? parts.slice(0, -1).join(", ") : parts[0] || "";
      const regionParts = (parts.length > 1 ? parts[parts.length - 1] : "").split(/\s+/).filter(Boolean);
      const stateCode = regionParts[0] ? regionParts[0].toUpperCase() : "";
      const countryCode = regionParts[1] ? regionParts[1].toUpperCase() : "US";
      return { city, stateCode, countryCode };
    }

    function defaultReportMetadata(summary) {
      return {
        tournamentDescr: summary.title || "",
        city: summary.city || "",
        stateCode: summary.stateCode || "",
        countryCode: summary.countryCode || "US",
        hostChapterId: "",
        hostChapterCode: "",
        hostChapterName: "",
        rewardEventKey: makeRewardEventKey(summary.title, summary.eventDate),
        rewardEventName: summary.title || "",
        rewardIsStateChampionship: false,
      };
    }

    function makeRewardEventKey(title, eventDate) {
      const titleSlug = String(title || "event")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "")
        .slice(0, 72) || "event";
      const dateSlug = String(eventDate || "").replace(/-/g, "");
      return [titleSlug, dateSlug].filter(Boolean).join("-");
    }

    function addReport(sourceName, content) {
      resetPreviewState();
      state.rewardLinksConfirmed = false;
      const summary = parseLocalReport(content, sourceName);
      state.reports.push({
        id: state.nextId,
        sequence: state.nextSequence,
        sourceName,
        content,
        ...summary,
        metadata: defaultReportMetadata(summary),
      });
      state.nextId += 1;
      state.nextSequence += 1;
      render();
    }

    function resetPreviewState() {
      state.previewPayload = null;
      state.stagedSummary = null;
      state.replaySummary = null;
      state.commitPreview = null;
      state.commitState = null;
      els.previewStatus.textContent = "No preview yet";
      els.previewOutput.innerHTML = "";
      els.stageBtn.disabled = true;
      els.replayBtn.disabled = true;
    }

    function storeBayratePayload(payload) {
      state.previewPayload = payload;
      if (Array.isArray(payload.host_chapter_options)) {
        state.hostChapterOptions = payload.host_chapter_options;
        state.metadataOptionsLoaded = true;
      }
    }

    async function loadMetadataOptions() {
      try {
        const response = await fetch(`${API_BASE}/api/ratings-explorer/bayrate/metadata-options`);
        const payload = await response.json();
        if (!response.ok || !payload.ok) throw new Error(payload.error || `Metadata lookup failed with HTTP ${response.status}`);
        if (Array.isArray(payload.host_chapter_options)) {
          state.hostChapterOptions = payload.host_chapter_options;
          state.metadataOptionsLoaded = true;
          render();
        }
      } catch (error) {
        state.metadataOptionsLoaded = false;
        els.previewStatus.textContent = `Metadata options unavailable: ${error.message}`;
      }
    }

    function hasDroppedFiles(event) {
      return Array.from(event.dataTransfer?.types || []).includes("Files");
    }

    function hasDroppedPlainText(event) {
      return Array.from(event.dataTransfer?.types || []).includes("text/plain");
    }

    function droppedFiles(dataTransfer) {
      const files = Array.from(dataTransfer?.files || []).filter((file) => file);
      if (files.length) return files;
      return Array.from(dataTransfer?.items || [])
        .filter((item) => item.kind === "file")
        .map((item) => item.getAsFile())
        .filter((file) => file);
    }

    function setDropzoneActive(active) {
      els.dropzone.classList.toggle("active", Boolean(active));
    }

    async function readDroppedData(dataTransfer) {
      const files = droppedFiles(dataTransfer);
      if (files.length) {
        await readFiles(files);
        return;
      }
      const text = dataTransfer?.getData("text/plain") || "";
      if (text.trim()) {
        const summary = parseLocalReport(text, "Dropped report");
        const suffix = summary.eventDate || String(state.nextId).padStart(2, "0");
        addReport(`dropped-report-${suffix}.txt`, text);
        els.previewStatus.textContent = "Loaded dropped report text";
      }
    }

    async function readFiles(files) {
      const fileList = Array.from(files || []).filter((file) => file);
      let loadedCount = 0;
      const failedNames = [];
      for (const file of fileList) {
        try {
          const content = await file.text();
          addReport(file.name, content);
          loadedCount += 1;
        } catch (error) {
          failedNames.push(file.name || "unnamed file");
        }
      }
      if (loadedCount) {
        els.previewStatus.textContent = `Loaded ${loadedCount} report file${loadedCount === 1 ? "" : "s"}`;
      }
      if (failedNames.length) {
        els.previewOutput.insertAdjacentHTML(
          "afterbegin",
          `<div class="error">Could not read ${escapeHtml(failedNames.join(", "))}</div>`
        );
      }
    }

    function orderedReports() {
      return [...state.reports].sort((left, right) => {
        const leftDate = left.eventDate || "9999-12-31";
        const rightDate = right.eventDate || "9999-12-31";
        if (leftDate !== rightDate) return leftDate.localeCompare(rightDate);
        return left.sequence - right.sequence;
      });
    }

    function sameDateGroups() {
      const groups = new Map();
      for (const report of state.reports) {
        if (!report.eventDate) continue;
        if (!groups.has(report.eventDate)) groups.set(report.eventDate, []);
        groups.get(report.eventDate).push(report);
      }
      return [...groups.entries()]
        .map(([eventDate, reports]) => [eventDate, reports.sort((a, b) => a.sequence - b.sequence)])
        .filter(([, reports]) => reports.length > 1)
        .sort(([left], [right]) => left.localeCompare(right));
    }

    function moveWithinDate(reportId, delta) {
      const report = state.reports.find((item) => item.id === reportId);
      if (!report || !report.eventDate) return;
      const group = state.reports
        .filter((item) => item.eventDate === report.eventDate)
        .sort((a, b) => a.sequence - b.sequence);
      const index = group.findIndex((item) => item.id === reportId);
      const nextIndex = index + delta;
      if (index < 0 || nextIndex < 0 || nextIndex >= group.length) return;
      const other = group[nextIndex];
      const sequence = report.sequence;
      report.sequence = other.sequence;
      other.sequence = sequence;
      resetPreviewState();
      render();
    }

    function removeReport(reportId) {
      state.reports = state.reports.filter((report) => report.id !== reportId);
      resetPreviewState();
      state.rewardLinksConfirmed = false;
      render();
    }

    function updateReportMetadataFromControl(control) {
      const reportId = Number(control.dataset.id);
      const key = control.dataset.reportMeta;
      const report = state.reports.find((item) => item.id === reportId);
      if (!report || !key) return;
      if (!report.metadata) report.metadata = defaultReportMetadata(report);
      if (control.type === "checkbox") {
        report.metadata[key] = Boolean(control.checked);
      } else {
        report.metadata[key] = control.value;
      }
      if (key === "hostChapterId") {
        const option = hostChapterOptionById(control.value);
        report.metadata.hostChapterCode = option ? option.chapter_code : "";
        report.metadata.hostChapterName = option ? option.chapter_name : "";
      }
      if (key === "tournamentDescr" && !String(report.metadata.rewardEventName || "").trim()) {
        report.metadata.rewardEventName = control.value;
      }
      resetPreviewState();
      state.rewardLinksConfirmed = false;
    }

    function linkDateGroup(eventDate) {
      const reports = state.reports
        .filter((report) => report.eventDate === eventDate)
        .sort((left, right) => left.sequence - right.sequence);
      if (reports.length < 2) return;
      const first = reports[0];
      const groupKey = first.metadata?.rewardEventKey || makeRewardEventKey(first.title, eventDate);
      const groupName = first.metadata?.rewardEventName || first.title || `Rewards event ${eventDate}`;
      for (const report of reports) {
        if (!report.metadata) report.metadata = defaultReportMetadata(report);
        report.metadata.rewardEventKey = groupKey;
        report.metadata.rewardEventName = groupName;
      }
      resetPreviewState();
      state.rewardLinksConfirmed = true;
      render();
    }

    function linkReportToRewardGroup(reportId, groupKey) {
      const report = state.reports.find((item) => item.id === reportId);
      const source = state.reports.find((item) => String(item.metadata?.rewardEventKey || "").trim() === groupKey);
      if (!report || !source || !groupKey) return;
      if (!report.metadata) report.metadata = defaultReportMetadata(report);
      report.metadata.rewardEventKey = groupKey;
      report.metadata.rewardEventName = source.metadata?.rewardEventName || source.title || groupKey;
      resetPreviewState();
      state.rewardLinksConfirmed = true;
      render();
    }

    function linkAllRewardGroups() {
      const reports = orderedReports();
      if (reports.length < 2) return;
      const first = reports[0];
      const groupKey = first.metadata?.rewardEventKey || makeRewardEventKey(first.title, first.eventDate);
      const groupName = first.metadata?.rewardEventName || first.title || groupKey;
      for (const report of reports) {
        if (!report.metadata) report.metadata = defaultReportMetadata(report);
        report.metadata.rewardEventKey = groupKey;
        report.metadata.rewardEventName = groupName;
      }
      resetPreviewState();
      state.rewardLinksConfirmed = true;
      render();
    }

    function confirmRewardLinks() {
      if (state.reports.length < 2 || state.busy) return;
      state.rewardLinksConfirmed = true;
      els.previewStatus.textContent = "Reward links confirmed";
      render();
    }

    function activeSummary() {
      return state.stagedSummary || (state.previewPayload && state.previewPayload.summary) || null;
    }

    function isCommitted() {
      return Boolean(
        (state.commitState && state.commitState.committed)
        || (state.commitPreview && state.commitPreview.executed)
      );
    }

    function hasPartialCommitMarker() {
      return Boolean(state.commitState && state.commitState.state === "partial_commit_marker");
    }

    function summaryTournaments(summary = activeSummary()) {
      return summary && Array.isArray(summary.tournaments) ? summary.tournaments : [];
    }

    function isReviewComplete(summary = activeSummary()) {
      if (!state.stagedSummary) return false;
      const tournaments = summaryTournaments(summary);
      if (!tournaments.length) return state.stagedSummary.status === "ready_for_rating";
      return tournaments.every((tournament) => tournament.status === "ready_for_rating");
    }

    function hasReplayRatings() {
      return Boolean(
        state.replaySummary
        || state.commitPreview
        || (state.commitState && (state.commitState.has_staged_ratings || state.commitState.committed))
      );
    }

    function reportMetadataIssues() {
      if (state.stagedSummary || !state.reports.length) return [];
      return orderedReports().flatMap((report) => {
        const metadata = report.metadata || {};
        const missing = [];
        if (!String(metadata.tournamentDescr || "").trim()) missing.push("tournament name");
        if (!String(metadata.hostChapterId || "").trim()) missing.push("host chapter");
        if (!String(metadata.rewardEventKey || "").trim()) missing.push("reward group");
        if (!String(metadata.rewardEventName || "").trim()) missing.push("group name");
        return missing.length ? [`${report.sourceName}: ${missing.join(", ")}`] : [];
      });
    }

    function reportMetadataComplete() {
      return Boolean(state.stagedSummary || (state.reports.length > 0 && reportMetadataIssues().length === 0));
    }

    function rewardLinkConfirmationNeeded() {
      return Boolean(!state.stagedSummary && state.reports.length > 1);
    }

    function rewardLinksComplete() {
      return Boolean(state.stagedSummary || !rewardLinkConfirmationNeeded() || state.rewardLinksConfirmed);
    }

    function rewardLinkSummary() {
      if (!state.reports.length) return "";
      const groups = new Map();
      for (const report of orderedReports()) {
        const key = String(report.metadata?.rewardEventKey || "").trim() || "unassigned";
        groups.set(key, (groups.get(key) || 0) + 1);
      }
      return [...groups.entries()].map(([key, count]) => `${key} (${count})`).join(", ");
    }

    function canRunReplay() {
      return Boolean(state.stagedSummary && isReviewComplete() && !isCommitted() && !hasPartialCommitMarker());
    }

    function canPreviewProductionCommit() {
      return Boolean(
        state.stagedSummary
        && isReviewComplete()
        && hasReplayRatings()
        && !isCommitted()
        && !hasPartialCommitMarker()
      );
    }

    function canCommitProduction() {
      return Boolean(canPreviewProductionCommit() && state.commitPreview && !state.commitPreview.executed);
    }

    function tournamentHasHost(tournament) {
      return Boolean(tournament && tournament.host_chapter_id && tournament.host_chapter_code);
    }

    function tournamentHasHostOrSelection(tournament) {
      return Boolean(
        tournamentHasHost(tournament)
        || selectedHostChapterId(tournament.source_report_ordinal)
      );
    }

    function reviewWaitingItems(summary = activeSummary()) {
      if (!state.stagedSummary) return [];
      return summaryTournaments(summary)
        .filter((tournament) => tournament.status !== "ready_for_rating")
        .map((tournament) => {
          const duplicate = tournament.duplicate_candidate;
          const errors = tournament.validation_errors || [];
          const hasHost = tournamentHasHostOrSelection(tournament);
          let waiting = "Mark ready.";
          if (tournament.status === "validation_failed" || errors.length) {
            waiting = "Resolve validation errors.";
          } else if (!hasHost) {
            waiting = "Select a host chapter.";
          } else if (duplicate && duplicate.tournament_code) {
            waiting = "Approve duplicate or choose a new code.";
          } else if (tournament.status === "needs_review" || tournament.status === "staged") {
            waiting = "Mark ready.";
          }
          return { tournament, waiting, hasHost, duplicate, errors };
        });
    }

    function workflowWaitingState() {
      const summary = activeSummary();
      const reportsReady = state.reports.length > 0 || Boolean(state.stagedSummary);
      if (state.busy) {
        return { main: "Current request to finish.", detail: els.previewStatus.textContent || "" };
      }
      if (isCommitted()) {
        return { main: "Workflow complete.", detail: "Production ratings were committed for this run." };
      }
      if (hasPartialCommitMarker()) {
        return { main: "Manual inspection.", detail: "This RunID has a partial commit marker, so production commit controls are blocked." };
      }
      if (!reportsReady) {
        return { main: "Reports or RunID.", detail: "Add report files, paste a report, or load an existing staged RunID." };
      }
      if (!reportMetadataComplete()) {
        return { main: "Enter tournament metadata.", detail: reportMetadataIssues().join(" ") };
      }
      if (!rewardLinksComplete()) {
        return {
          main: "Confirm reward links.",
          detail: "Link sections that belong to one rewards event, or confirm the current groups are intentionally independent.",
        };
      }
      if (!state.previewPayload && !state.stagedSummary) {
        return { main: "Preview Run.", detail: "Preview parses the reports and checks duplicate/same-date issues." };
      }
      if (!state.stagedSummary) {
        return { main: "Write Staged Run.", detail: "The preview is ready; write it to BayRate staging tables before review." };
      }
      const waitingItems = reviewWaitingItems(summary);
      if (waitingItems.length) {
        return {
          main: "Review and Mark Ready.",
          detail: waitingItems.map((item) => `${item.tournament.tournament_code}: ${item.waiting}`).join(" "),
        };
      }
      if (!hasReplayRatings()) {
        return { main: "Run Replay.", detail: "The staged tournaments are ready; replay will stage the rating rows and cascade events." };
      }
      if (!state.commitPreview) {
        return { main: "Preview Production Commit.", detail: "Replay is complete; build the final production write plan." };
      }
      return { main: "Commit to Production.", detail: "Review the commit preview, then confirm the production write." };
    }

    function workflowSteps() {
      const reportsDone = state.reports.length > 0 || Boolean(state.stagedSummary);
      const metadataDone = reportMetadataComplete();
      const linksDone = rewardLinksComplete();
      const previewDone = Boolean(state.previewPayload || state.stagedSummary);
      const stageDone = Boolean(state.stagedSummary);
      const reviewDone = isReviewComplete();
      const replayDone = hasReplayRatings();
      const commitPreviewDone = Boolean(state.commitPreview);
      const commitDone = isCommitted();
      const definitions = [
        { id: "reports", label: "Reports", done: reportsDone, state: reportsDone ? "loaded" : "waiting" },
        { id: "metadata", label: "Metadata", done: metadataDone, state: metadataDone ? "complete" : "needed" },
        { id: "links", label: "Reward Links", done: linksDone, state: linksDone ? (state.rewardLinksConfirmed ? "confirmed" : "not needed") : "confirm" },
        { id: "preview", label: "Preview", done: previewDone, state: previewDone ? "done" : "waiting" },
        { id: "stage", label: "Stage", done: stageDone, state: stageDone ? "written" : "waiting" },
        { id: "review", label: "Review", done: reviewDone, state: reviewDone ? "ready" : "waiting" },
        { id: "replay", label: "Replay", done: replayDone, state: replayDone ? "ratings staged" : "waiting" },
        { id: "plan", label: "Commit Plan", done: commitPreviewDone, state: commitPreviewDone ? "previewed" : "waiting" },
        { id: "commit", label: "Commit", done: commitDone, state: commitDone ? "complete" : "waiting" },
      ];
      const current = definitions.find((step) => !step.done);
      return definitions.map((step) => ({
        ...step,
        current: current && current.id === step.id,
        blocked: hasPartialCommitMarker() && (step.id === "plan" || step.id === "commit"),
      }));
    }

    function renderWorkflow() {
      const waiting = workflowWaitingState();
      els.workflowLastAction.textContent = els.previewStatus.textContent || "No preview yet";
      els.workflowWaiting.textContent = waiting.main;
      els.workflowWaitingDetail.textContent = waiting.detail || "";
      els.workflowSteps.innerHTML = workflowSteps().map((step) => {
        const className = step.blocked ? "blocked" : step.done ? "done" : step.current ? "current" : "";
        return `
          <div class="workflow-step ${className}">
            <div class="workflow-step-title">${escapeHtml(step.label)}</div>
            <div class="workflow-step-state">${escapeHtml(step.blocked ? "blocked" : step.state)}</div>
          </div>
        `;
      }).join("");
      renderWorkflowReview();
    }

    function renderWorkflowReview() {
      if (!state.stagedSummary && state.reports.length) {
        const metadataIssues = reportMetadataIssues();
        const rewardLinkText = rewardLinkConfirmationNeeded()
          ? (state.rewardLinksConfirmed ? `Reward groups confirmed: ${rewardLinkSummary()}` : `Reward groups need confirmation: ${rewardLinkSummary()}`)
          : "Single-report run; no reward linking needed.";
        els.workflowReview.innerHTML = `
          <span class="workflow-label">Pre-stage setup</span>
          ${metadataIssues.length ? `<span class="workflow-review-item"><span class="workflow-review-title">Metadata</span><span class="muted">${escapeHtml(metadataIssues.join(" "))}</span></span>` : '<span class="workflow-review-item"><span class="workflow-review-title">Metadata</span><span class="muted">Complete</span></span>'}
          <span class="workflow-review-item"><span class="workflow-review-title">Reward Links</span><span class="muted">${escapeHtml(rewardLinkText)}</span></span>
        `;
        return;
      }
      if (!state.stagedSummary) {
        els.workflowReview.innerHTML = '<span class="muted">Review actions appear here after staging.</span>';
        return;
      }
      const waitingItems = reviewWaitingItems();
      if (!waitingItems.length) {
        els.workflowReview.innerHTML = '<span class="message ready">All staged tournaments are marked ready.</span>';
        return;
      }
      els.workflowReview.innerHTML = `
        <span class="workflow-label">Review queue</span>
        ${waitingItems.map(renderWorkflowReviewItem).join("")}
      `;
    }

    function renderWorkflowReviewItem(item) {
      const tournament = item.tournament;
      const duplicate = item.duplicate;
      const canApproveDuplicate = Boolean(
        duplicate
        && duplicate.tournament_code
        && item.hasHost
        && tournament.status === "needs_review"
        && !item.errors.length
      );
      const canMarkReady = Boolean(
        item.hasHost
        && !duplicate
        && !item.errors.length
        && ["needs_review", "staged"].includes(tournament.status)
      );
      return `
        <span class="workflow-review-item">
          <span class="workflow-review-title">${escapeHtml(tournament.tournament_code || tournament.description)}</span>
          <span class="muted">${escapeHtml(item.waiting)}</span>
          ${canApproveDuplicate ? `
            <button
              type="button"
              class="success"
              data-action="approve-duplicate"
              data-ordinal="${escapeHtml(tournament.source_report_ordinal)}"
              data-code="${escapeHtml(duplicate.tournament_code)}"
            >Approve Duplicate</button>
          ` : ""}
          ${canMarkReady ? `
            <button
              type="button"
              class="success"
              data-action="mark-ready"
              data-ordinal="${escapeHtml(tournament.source_report_ordinal)}"
              data-code="${escapeHtml(tournament.tournament_code)}"
            >Mark Ready</button>
          ` : ""}
          <button type="button" data-action="scroll-tournament" data-ordinal="${escapeHtml(tournament.source_report_ordinal)}">Details</button>
        </span>
      `;
    }

    function scrollToTournament(sourceReportOrdinal) {
      const element = document.getElementById(`tournament-${String(sourceReportOrdinal).replace(/"/g, "")}`);
      if (!element) return;
      element.scrollIntoView({ behavior: "smooth", block: "center" });
      element.classList.add("drop-target");
      window.setTimeout(() => element.classList.remove("drop-target"), 1200);
    }

    function render() {
      els.sourceCount.textContent = `${state.reports.length} report${state.reports.length === 1 ? "" : "s"}`;
      els.loadRunBtn.disabled = state.busy;
      els.linkAllRewardsBtn.disabled = state.busy || state.reports.length < 2;
      els.previewBtn.disabled = state.busy || state.reports.length === 0 || !reportMetadataComplete() || !rewardLinksComplete();
      els.confirmRewardLinksBtn.disabled = state.busy || state.reports.length < 2 || state.rewardLinksConfirmed || Boolean(state.stagedSummary);
      els.stageBtn.disabled = (
        state.busy
        || !state.previewPayload
        || Boolean(state.stagedSummary)
        || !reportMetadataComplete()
        || !rewardLinksComplete()
      );
      els.replayBtn.disabled = state.busy || !canRunReplay();
      els.commitPreviewBtn.disabled = state.busy || !canPreviewProductionCommit();
      els.commitRunBtn.disabled = state.busy || !canCommitProduction();
      renderWorkflow();
      renderSources();
      renderSameDates();
    }

    function renderSources() {
      const reports = orderedReports();
      renderRewardGroupOptions();
      if (!reports.length) {
        els.sourceList.innerHTML = '<div class="empty">No source reports loaded.</div>';
        return;
      }
      els.sourceList.innerHTML = reports.map((report, index) => `
        <article class="source-card" data-id="${report.id}">
          <div class="preview-title">
            <div>
              <div class="source-title">${escapeHtml(report.title)}</div>
              <div class="source-meta">
                <span>${escapeHtml(report.sourceName)}</span>
                <span>${report.eventDate || "date not found"}</span>
                <span>${report.playerCountHint ? `${report.playerCountHint} players` : "players unknown"}</span>
              </div>
            </div>
            <span class="pill">#${index + 1}</span>
          </div>
          ${renderReportMetadata(report)}
          <div class="row-actions">
            <button type="button" data-action="remove" data-id="${report.id}">Remove</button>
          </div>
        </article>
      `).join("");
    }

    function renderReportMetadata(report) {
      const metadata = report.metadata || defaultReportMetadata(report);
      const hostId = String(metadata.hostChapterId || "");
      const countryCode = metadata.countryCode === "" ? "" : String(metadata.countryCode || "US").toUpperCase();
      return `
        <div class="metadata-grid">
          <label class="metadata-wide">
            Tournament name
            <input type="text" maxlength="255" value="${escapeHtml(metadata.tournamentDescr || "")}" data-report-meta="tournamentDescr" data-id="${report.id}" />
          </label>
          <label>
            Host chapter
            <select data-report-meta="hostChapterId" data-id="${report.id}" ${state.metadataOptionsLoaded ? "" : "disabled"}>
              <option value="">${state.metadataOptionsLoaded ? "Select host chapter" : "Loading chapters"}</option>
              ${state.hostChapterOptions.map((option) => {
                const value = String(option.chapter_id || "");
                return `<option value="${escapeHtml(value)}" ${value === hostId ? "selected" : ""}>${escapeHtml(option.label || option.chapter_code || value)}</option>`;
              }).join("")}
            </select>
          </label>
          <label>
            City
            <input type="text" maxlength="100" value="${escapeHtml(metadata.city || "")}" data-report-meta="city" data-id="${report.id}" />
          </label>
          <label>
            State
            <select data-report-meta="stateCode" data-id="${report.id}">
              ${STATE_OPTIONS.map((option) => `<option value="${escapeHtml(option)}" ${String(metadata.stateCode || "").toUpperCase() === option ? "selected" : ""}>${escapeHtml(option || "None")}</option>`).join("")}
            </select>
          </label>
          <label>
            Country
            <select data-report-meta="countryCode" data-id="${report.id}">
              ${COUNTRY_OPTIONS.map((option) => `<option value="${escapeHtml(option)}" ${countryCode === option ? "selected" : ""}>${escapeHtml(option || "Other")}</option>`).join("")}
            </select>
          </label>
          <label>
            Reward group
            <input type="text" maxlength="128" list="rewardGroupOptions" value="${escapeHtml(metadata.rewardEventKey || "")}" data-report-meta="rewardEventKey" data-id="${report.id}" />
          </label>
          <label>
            Link to
            <select data-link-reward-group="${report.id}">
              <option value="">Independent group</option>
              ${rewardGroupChoicesFor(report.id).map((choice) => `
                <option value="${escapeHtml(choice.key)}" ${String(metadata.rewardEventKey || "") === choice.key ? "selected" : ""}>
                  ${escapeHtml(choice.label)}
                </option>
              `).join("")}
            </select>
          </label>
          <label class="metadata-wide">
            Group name
            <input type="text" maxlength="255" value="${escapeHtml(metadata.rewardEventName || "")}" data-report-meta="rewardEventName" data-id="${report.id}" />
          </label>
          <label class="checkbox-field">

    function renderRewardGroupOptions() {
      const values = [];
      const seen = new Set();
      for (const report of orderedReports()) {
        const key = String(report.metadata?.rewardEventKey || "").trim();
        if (!key || seen.has(key)) continue;
        seen.add(key);
        values.push(key);
      }
      els.rewardGroupOptions.innerHTML = values.map((value) => `<option value="${escapeHtml(value)}"></option>`).join("");
    }

    function rewardGroupChoicesFor(reportId) {
      const choices = [];
      const seen = new Set();
      for (const report of orderedReports()) {
        if (report.id === reportId) continue;
        const key = String(report.metadata?.rewardEventKey || "").trim();
        if (!key || seen.has(key)) continue;
        seen.add(key);
        const groupName = String(report.metadata?.rewardEventName || report.title || "").trim();
        choices.push({
          key,
          name: groupName,
          label: groupName ? `${groupName} (${key})` : key,
        });
      }
      return choices;
    }

    function renderSameDates() {
      const groups = sameDateGroups();
      if (!groups.length) {
        els.sameDateList.innerHTML = '<div class="empty">No same-date report groups.</div>';
        return;
      }
      els.sameDateList.innerHTML = groups.map(([eventDate, reports]) => `
        <section class="same-date-group">
          <div class="section-head">
            <h3>${eventDate}</h3>
            <div class="row-actions">
              <span class="pill">${reports.length} events</span>
              <button type="button" data-action="link-date-group" data-date="${escapeHtml(eventDate)}">Link Rewards</button>
            </div>
          </div>
          ${reports.map((report, index) => `
            <div class="event-row" draggable="true" data-id="${report.id}">
              <span class="event-index">${index + 1}</span>
              <div>
                <div class="source-title">${escapeHtml(report.title)}</div>
                <div class="source-meta">${escapeHtml(report.sourceName)}</div>
              </div>
              <div class="row-actions">
                <button type="button" data-action="up" data-id="${report.id}" ${index === 0 ? "disabled" : ""}>Up</button>

              </div>
            </div>

        </section>
      `).join("");

    function reportRequestItems() {
      return orderedReports().map((report) => ({
        source_name: report.sourceName,

      const metadata = report.metadata || {};

      return {
        tournament_descr: String(metadata.tournamentDescr || "").trim(),
        city: String(metadata.city || "").trim(),
        state_code: String(metadata.stateCode || "").trim().toUpperCase(),
        country_code: String(metadata.countryCode || "").trim().toUpperCase(),

        host_chapter_code: hostOption ? hostOption.chapter_code : metadata.hostChapterCode || null,
        host_chapter_name: hostOption ? hostOption.chapter_name : metadata.hostChapterName || null,
        reward_event_key: String(metadata.rewardEventKey || "").trim(),
        reward_event_name: String(metadata.rewardEventName || "").trim(),

        if (runId) els.runIdInput.value = runId;

      if (!runId || state.busy) return;
      if (state.reports.length && !window.confirm("Load this staged run and clear the current report intake?")) return;

      state.reports = [];
      state.previewPayload = null;

    async function commitRun() {
      if (!state.stagedSummary || !state.commitPreview || state.busy) return;
      const runId = state.commitPreview.run_id || state.stagedSummary.run_id;
      const confirmation = `COMMIT RUN ${runId}`;
      const writeCount = state.commitPreview.production_write_count || 0;
      if (!window.confirm(`Commit RunID ${runId} to production ratings tables with ${writeCount} planned writes?`)) {
        els.previewStatus.textContent = "Commit cancelled before sending request";
        return;
      }
      const typed = window.prompt(`Type ${confirmation} to commit production ratings`, "");
      if (typed !== confirmation) {
        els.previewStatus.textContent = "Commit cancelled: confirmation text did not match";
        return;
      }
      let confirmSgfReplacement = false;
      if (state.commitPreview.requires_sgf_acknowledgement) {
        confirmSgfReplacement = window.confirm("Existing production game rows with SGF links will be replaced. Continue?");
        if (!confirmSgfReplacement) {
          els.previewStatus.textContent = "Commit cancelled before SGF replacement acknowledgement";
          return;
        }
      }
      state.busy = true;
      els.previewStatus.textContent = "Committing to production...";
      render();
      try {
        const response = await fetch(`${API_BASE}/api/ratings-explorer/bayrate/commit`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            run_id: runId,
            confirm_production_commit: true,
            confirmation_text: confirmation,
            commit_plan_hash: state.commitPreview.plan_hash,
            confirm_sgf_replacement: confirmSgfReplacement,
          }),
        });
        const payload = await response.json();
        if (!response.ok || !payload.ok) throw new Error(payload.error || `Commit failed with HTTP ${response.status}`);
        state.commitPreview = payload.commit_plan;
        state.commitState = payload.commit_state || { state: "committed", committed: true };
        els.previewStatus.textContent = "Production commit complete";
        renderPreview(state.previewPayload);
      } catch (error) {
        els.previewStatus.textContent = "Commit failed";
        els.previewOutput.insertAdjacentHTML("afterbegin", `<div class="error">${escapeHtml(error.message)}</div>`);
      } finally {
        state.busy = false;
        render();
      }
    }

    function renderPreview(payload) {
      const summary = payload.summary;
      const tournaments = summary.tournaments || [];
      els.previewOutput.innerHTML = `
        ${renderRunBanner(summary)}
        ${renderRunWarnings(summary.warnings || [])}
        <div class="metrics">
          ${metric("Status", summary.status)}
          ${metric("Reports", summary.source_report_count)}
          ${metric("Tournaments", summary.tournament_count)}
          ${metric("Games", summary.game_count)}
        </div>
        <div class="preview-list">
          ${tournaments.map(renderTournament).join("")}
        </div>
        ${renderApiSameDateGroups(payload.same_date_groups || [])}
        ${renderReviewExplanation(payload.review_explanation)}
        ${renderReplaySummary(state.replaySummary)}
        ${renderCommitPreview(state.commitPreview)}
      `;
    }

    function renderRunWarnings(warnings) {
      if (!warnings.length) return "";
      return `
        <section class="message-list">
          ${warnings.map(renderWarning).join("")}
        </section>
      `;
    }

    function renderRunBanner(summary) {
      if (!summary) return "";
      const written = Boolean(summary.written || state.stagedSummary);
      const runId = summary.run_id || (state.stagedSummary && state.stagedSummary.run_id);
      const commitState = state.commitState || {};
      const committed = Boolean(commitState.committed);
      const partialCommitMarker = commitState.state === "partial_commit_marker";
      return `
        <div class="run-banner">
          <div>
            <strong>${written ? "Staged Run" : "Preview Run"}</strong>
            <div class="source-meta">
              ${runId ? `RunID ${escapeHtml(runId)}` : "Not written to SQL"}
              ${commitState.state ? `<span>${escapeHtml(commitState.state.replace(/_/g, " "))}</span>` : ""}
            </div>
          </div>
          <div class="row-actions">
            <span class="muted">${committed ? "Production commit is complete." : partialCommitMarker ? "Commit controls are blocked for manual inspection." : "Use the workflow controls at the top."}</span>
          </div>
        </div>
      `;
    }

    function metric(label, value) {
      return `
        <div class="metric">
          <div class="muted">${escapeHtml(label)}</div>
          <div class="metric-value">${escapeHtml(value)}</div>
        </div>
      `;
    }

    function renderTournament(tournament) {
      const statusClass = tournament.status === "ready_for_rating"
        ? "ready"
        : tournament.status === "validation_failed"
          ? "failed"
          : tournament.status === "needs_review"
            ? "review"
            : "";
      const duplicate = tournament.duplicate_candidate;
      const warnings = tournament.warnings || [];
      const hostLabel = tournament.host_chapter_label || "Host chapter needed";
      const canApproveDuplicate = Boolean(
        state.stagedSummary
        && duplicate
        && duplicate.tournament_code
        && tournament.status === "needs_review"
      );
      const canMarkReady = Boolean(
        state.stagedSummary
        && !duplicate
        && !((tournament.validation_errors || []).length)
        && ["needs_review", "staged"].includes(tournament.status)
      );
      return `
        <article class="preview-card" id="tournament-${escapeHtml(tournament.source_report_ordinal)}">
          <div class="preview-title">
            <div>
              <div class="source-title">${escapeHtml(tournament.description || tournament.tournament_code)}</div>
              <div class="source-meta">
                <span>${escapeHtml(tournament.tournament_code)}</span>
                <span>${escapeHtml(tournament.tournament_date)}</span>
                <span>${escapeHtml([tournament.city, tournament.state_code].filter(Boolean).join(", ") || "location not set")}</span>
                <span>${escapeHtml(tournament.source_report_name)}</span>
                <span>${escapeHtml(hostLabel)}</span>
                <span>${escapeHtml(tournament.reward_event_key || tournament.tournament_code)}</span>
                ${tournament.reward_is_state_championship ? "<span>State Championship</span>" : ""}
              </div>
            </div>
            <span class="status-label ${statusClass}">${escapeHtml(tournament.status)}</span>
          </div>
          ${renderHostChapterControl(tournament)}
          ${duplicate ? `<div class="message">Duplicate candidate: ${escapeHtml(duplicate.tournament_code)} score ${escapeHtml(duplicate.score)}</div>` : ""}
          ${warnings.map(renderWarning).join("")}
          ${(tournament.validation_errors || []).map((error) => `<div class="error">${escapeHtml(error)}</div>`).join("")}
          ${canApproveDuplicate || canMarkReady ? `
            <div class="row-actions">
              ${canApproveDuplicate ? `
                <button
                  type="button"
                  class="success"
                  data-action="approve-duplicate"
                  data-ordinal="${tournament.source_report_ordinal}"
                  data-code="${escapeHtml(duplicate.tournament_code)}"
                >Approve Duplicate</button>
              ` : ""}
              ${canMarkReady ? `
                <button
                  type="button"
                  class="success"
                  data-action="mark-ready"
                  data-ordinal="${tournament.source_report_ordinal}"
                  data-code="${escapeHtml(tournament.tournament_code)}"
                >Mark Ready</button>
              ` : ""}
            </div>
          ` : ""}
        </article>
      `;
    }
