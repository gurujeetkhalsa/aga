      const currentId = tournament.host_chapter_id ? String(tournament.host_chapter_id) : "";
      if (!state.stagedSummary) {
        return `<div class="message ${currentId ? "ready" : "review"}">${currentId ? "Metadata from Source Reports will be written with this staged run." : "Select a host chapter in Source Reports before writing the staged run."}</div>`;
      }
      if (!state.hostChapterOptions.length) {
        return `<div class="message review">Host chapter options are unavailable.</div>`;
      }
      const rewardKey = tournament.reward_event_key || tournament.tournament_code || "";
      const rewardName = tournament.reward_event_name || tournament.description || "";
      const isStateChampionship = Boolean(tournament.reward_is_state_championship);
      return `
        <div class="host-chapter-row">
          <label>
            Host chapter
            <select data-host-chapter="${escapeHtml(tournament.source_report_ordinal)}">
              <option value="">Select host chapter</option>
              ${state.hostChapterOptions.map((option) => {
                const value = String(option.chapter_id || "");
                return `<option value="${escapeHtml(value)}" ${value === currentId ? "selected" : ""}>${escapeHtml(option.label || option.chapter_code || value)}</option>`;
              }).join("")}
            </select>
          </label>
          <label>
            Reward group
            <input
              type="text"
              maxlength="128"
              value="${escapeHtml(rewardKey)}"
              data-reward-event-key="${escapeHtml(tournament.source_report_ordinal)}"
            />
          </label>
          <label>
            Group name
            <input
              type="text"
              maxlength="255"
              value="${escapeHtml(rewardName)}"
              data-reward-event-name="${escapeHtml(tournament.source_report_ordinal)}"
            />
          </label>
          <label class="checkbox-field">
            <input
              type="checkbox"
              ${isStateChampionship ? "checked" : ""}
              data-reward-state-championship="${escapeHtml(tournament.source_report_ordinal)}"
            />
            State Championship
          </label>
          <button
            type="button"
            data-action="save-host"
            data-ordinal="${escapeHtml(tournament.source_report_ordinal)}"
          >Save Details</button>
        </div>
      `;
    }

    function selectedHostChapterId(sourceReportOrdinal) {
      const selector = `select[data-host-chapter="${String(sourceReportOrdinal).replace(/"/g, "")}"]`;
      const select = document.querySelector(selector);
      return String(select ? select.value : "").trim();
    }

    function selectedRewardEvent(sourceReportOrdinal) {
      const ordinal = String(sourceReportOrdinal).replace(/"/g, "");
      const keyInput = document.querySelector(`input[data-reward-event-key="${ordinal}"]`);
      const nameInput = document.querySelector(`input[data-reward-event-name="${ordinal}"]`);
      const stateChampionshipInput = document.querySelector(`input[data-reward-state-championship="${ordinal}"]`);
      return {
        key: String(keyInput ? keyInput.value : "").trim(),
        name: String(nameInput ? nameInput.value : "").trim(),
        isStateChampionship: Boolean(stateChampionshipInput && stateChampionshipInput.checked),
      };
    }

    function hostChapterOptionById(hostChapterId) {
      const id = String(hostChapterId || "");
      return state.hostChapterOptions.find((option) => String(option.chapter_id || "") === id) || null;
    }

    function renderWarning(warning) {
      const reviewRequired = Boolean(warning.review_required || warning.severity === "review");
      const highlighted = Boolean(warning.highlight || warning.severity === "highlight");
      const className = reviewRequired ? "review" : highlighted ? "highlight" : "";
      return `
        <div class="message ${className}">
          <span class="warning-title">${escapeHtml(warningLabel(warning))}</span>
          ${escapeHtml(warning.message || warning.type || "Warning")}
        </div>
      `;
    }

    function warningLabel(warning) {
      if (warning.review_required || warning.severity === "review") return "Review required";
      if (warning.type === "membership_name_mismatch") return "Name warning";
      if (warning.type === "entry_rank_mismatch") return warning.highlight ? "Rank warning highlighted" : "Rank warning";
      if (warning.type === "generated_tournament_code") return "Code warning";
      if (warning.type === "inferred_round_information") return "Round warning";
      return "Warning";
    }

    function renderApiSameDateGroups(groups) {
      if (!groups.length) return "";
      return `
        <section class="same-date-list">
          <div class="section-head"><h2>Preview Same-Date Order</h2></div>
          ${groups.map((group) => `
            <div class="same-date-group">
              <div class="section-head">
                <h3>${escapeHtml(group.tournament_date)}</h3>
                <span class="pill">${group.events.length} events</span>
              </div>
              ${group.events.map((event, index) => `
                <div class="event-row">
                  <span class="event-index">${index + 1}</span>
                  <div>
                    <div class="source-title">${escapeHtml(event.title || event.tournament_code)}</div>
                    <div class="source-meta">
                      <span>${escapeHtml(event.tournament_code)}</span>
                      <span>${escapeHtml(event.status)}</span>
                      <span>${escapeHtml(event.game_count)} games</span>
                    </div>
                  </div>
                </div>
              `).join("")}
            </div>
          `).join("")}
        </section>
      `;
    }

    function renderReviewExplanation(explanation) {
      const tournaments = explanation && explanation.tournaments ? explanation.tournaments : [];
      if (!tournaments.length) return "";
      return `
        <section class="message-list">
          <div class="section-head"><h2>Review Details</h2></div>
          ${tournaments.map((item) => {
            const diff = item.game_diff || {};
            const duplicate = item.duplicate_candidate || {};
            const sameDateOrder = item.same_date_order || [];
            return `
              <div class="message">
                <strong>${escapeHtml(item.staged_code)}</strong>
                ${duplicate.tournament_code ? `<div>Duplicate candidate: ${escapeHtml(duplicate.tournament_code)} score ${escapeHtml(duplicate.score)}</div>` : ""}
                ${diff.staged_game_count !== undefined ? `<div>Game comparison: matched ${escapeHtml(diff.matched_game_count)} of ${escapeHtml(diff.staged_game_count)} staged games against ${escapeHtml(diff.production_game_count)} production games.</div>` : ""}
                ${sameDateOrder.length ? `<div>Production same-date order: ${sameDateOrder.map((row) => `${row.order}. ${row.tournament_code}`).join(", ")}</div>` : ""}
              </div>
            `;
          }).join("")}
        </section>
      `;
    }

    function renderReplaySummary(replay) {
      if (!replay) return "";
      const plan = replay.plan || {};
      const result = replay.result_summary || {};
      const pre = result.pre_event_metrics || {};
      const post = result.post_event_fit_metrics || {};
      const stagedRatingCount = result.staged_rating_count || (replay.staged_rating_summary && replay.staged_rating_summary.rating_count) || 0;
      return `
        <section class="preview-card">
          <div class="preview-title">
            <div>
              <div class="source-title">Replay And Staged Ratings</div>
              <div class="source-meta">
                <span>${escapeHtml(plan.event_count)} events</span>
                <span>${escapeHtml(plan.game_count)} games</span>
                <span>Production writes ${escapeHtml(plan.production_write_count || 0)}</span>
              </div>
            </div>
            <span class="status-label ready">complete</span>
          </div>
          <div class="metrics">
            ${metric("Staged Ratings", stagedRatingCount)}
            ${metric("Pre Accuracy", formatMetric(pre.accuracy))}
            ${metric("Post Accuracy", formatMetric(post.accuracy))}
          </div>
          ${renderStagedRatingEvents(replay.staged_rating_summary)}
        </section>
      `;
    }

    function renderStagedRatingEvents(summary) {
      const events = summary && summary.events ? summary.events : [];
      if (!events.length) return "";
      return `
        <div class="message-list">
          ${events.slice(0, 8).map((event) => `
            <div class="message">
              <strong>${escapeHtml(event.tournament_code)}</strong>
              <div>${escapeHtml(event.rating_count)} staged rating rows from ${escapeHtml(event.event_source)}</div>
            </div>
          `).join("")}
          ${events.length > 8 ? `<div class="message">${events.length - 8} more replay event(s) staged.</div>` : ""}
        </div>
      `;
    }

    function renderCommitPreview(plan) {
      if (!plan) return "";
      const gameRange = plan.game_id_range || {};
      const ratingRange = plan.rating_id_range || {};
      const executed = Boolean(plan.executed);
      return `
        <section class="preview-card">
          <div class="preview-title">
            <div>
              <div class="source-title">${executed ? "Production Commit Complete" : "Production Commit Preview"}</div>
              <div class="source-meta">
                <span>RunID ${escapeHtml(plan.run_id)}</span>
                <span>${escapeHtml(plan.production_write_count || 0)} planned production writes</span>
              </div>
            </div>
            <span class="status-label ${executed ? "ready" : "review"}">${executed ? "committed" : "preview only"}</span>
          </div>
          <div class="metrics">
            ${metric("Tournament Upserts", plan.tournament_upsert_count || 0)}
            ${metric("Game Inserts", plan.game_insert_count || 0)}
            ${metric("Rating Inserts", plan.rating_insert_count || 0)}
            ${metric("Cascade Events", (plan.production_cascade_tournament_codes || []).length)}
          </div>
          <div class="message-list">
            <div class="message">
              <strong>Affected ratings</strong>
              <div>${escapeHtml((plan.affected_tournament_codes || []).join(", ") || "none")}</div>
            </div>
            <div class="message">
              <strong>Production game IDs</strong>
              <div>${gameRange.first ? `${escapeHtml(gameRange.first)} to ${escapeHtml(gameRange.last)}` : "none"}</div>
            </div>
            <div class="message">
              <strong>Production rating row IDs</strong>
              <div>${ratingRange.first ? `${escapeHtml(ratingRange.first)} to ${escapeHtml(ratingRange.last)}` : "none"}</div>
            </div>
            <div class="message">
              <strong>Plan hash</strong>
              <div>${escapeHtml((plan.plan_hash || "").slice(0, 16))}</div>
            </div>
            ${executed ? '<div class="message ready">Production tables were written for this RunID.</div>' : ""}
            ${plan.requires_sgf_acknowledgement ? '<div class="message review">Existing SGF-linked production game rows require explicit acknowledgement before commit.</div>' : ""}
            ${(plan.warnings || []).map((warning) => `<div class="message review">${escapeHtml(warning)}</div>`).join("")}
          </div>
        </section>
      `;
    }

    function formatMetric(value) {
      if (value === null || value === undefined || Number.isNaN(Number(value))) return "";
      return Number(value).toFixed(4);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    els.dropzone.addEventListener("click", (event) => {
      if (event.target.closest("button")) return;
      els.fileInput.click();
    });

    els.dropzone.addEventListener("keydown", (event) => {
      if (event.key !== "Enter" && event.key !== " ") return;
      event.preventDefault();
      els.fileInput.click();
    });

    els.chooseFilesBtn.addEventListener("click", (event) => {
      event.preventDefault();
      event.stopPropagation();
      els.fileInput.click();
    });

    els.fileInput.addEventListener("change", async () => {
      await readFiles(els.fileInput.files);
      els.fileInput.value = "";
    });

    document.addEventListener("dragover", (event) => {
      if (!hasDroppedFiles(event)) return;
      event.preventDefault();
      event.dataTransfer.dropEffect = "copy";
    });

    document.addEventListener("drop", async (event) => {
      if (!hasDroppedFiles(event) || event.target.closest("#dropzone")) return;
      event.preventDefault();
      await readDroppedData(event.dataTransfer);
    });

    els.dropzone.addEventListener("dragenter", (event) => {
      if (!hasDroppedFiles(event) && !hasDroppedPlainText(event)) return;
      event.preventDefault();
      state.dropDepth += 1;
      setDropzoneActive(true);
    });

    els.dropzone.addEventListener("dragover", (event) => {
      if (!hasDroppedFiles(event) && !hasDroppedPlainText(event)) return;
      event.preventDefault();
      event.dataTransfer.dropEffect = "copy";
      setDropzoneActive(true);
    });

    els.dropzone.addEventListener("dragleave", (event) => {
      if (!hasDroppedFiles(event) && !hasDroppedPlainText(event)) return;
      event.preventDefault();
      state.dropDepth = Math.max(0, state.dropDepth - 1);
      if (state.dropDepth === 0) setDropzoneActive(false);
    });

    els.dropzone.addEventListener("drop", async (event) => {
      if (!hasDroppedFiles(event) && !hasDroppedPlainText(event)) return;
      event.preventDefault();
      event.stopPropagation();
      state.dropDepth = 0;
      setDropzoneActive(false);
      await readDroppedData(event.dataTransfer);
    });

    els.addPasteBtn.addEventListener("click", () => {
      const content = els.pasteBox.value;
      if (!content.trim()) return;
      const summary = parseLocalReport(content, "Pasted report");
      const suffix = summary.eventDate || String(state.nextId).padStart(2, "0");
      addReport(`pasted-report-${suffix}.txt`, content);
      els.pasteBox.value = "";
    });

    els.clearAllBtn.addEventListener("click", () => {
      state.reports = [];
      state.rewardLinksConfirmed = false;
      resetPreviewState();
      render();
    });

    els.previewBtn.addEventListener("click", previewRun);
    els.stageBtn.addEventListener("click", stageRun);
    els.replayBtn.addEventListener("click", replayRun);
    els.confirmRewardLinksBtn.addEventListener("click", confirmRewardLinks);
    els.linkAllRewardsBtn.addEventListener("click", linkAllRewardGroups);
    els.loadRunBtn.addEventListener("click", loadRun);
    els.runIdInput.addEventListener("input", render);
    els.runIdInput.addEventListener("keydown", (event) => {
      if (event.key !== "Enter") return;
      event.preventDefault();
      loadRun();
    });

    document.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-action]");
      if (!button) return;
      const id = Number(button.dataset.id);
      if (button.dataset.action === "remove") removeReport(id);
      if (button.dataset.action === "up") moveWithinDate(id, -1);
      if (button.dataset.action === "down") moveWithinDate(id, 1);
      if (button.dataset.action === "stage-preview") stageRun();
      if (button.dataset.action === "replay-run") replayRun();
      if (button.dataset.action === "commit-preview") previewCommit();
      if (button.dataset.action === "commit-run") commitRun();
      if (button.dataset.action === "approve-duplicate") {
        approveDuplicate(Number(button.dataset.ordinal), button.dataset.code || "");
      }
      if (button.dataset.action === "mark-ready") {
        markReady(Number(button.dataset.ordinal), button.dataset.code || "");
      }
      if (button.dataset.action === "save-host") {
        saveHostChapter(Number(button.dataset.ordinal));
      }
      if (button.dataset.action === "link-date-group") {
        linkDateGroup(button.dataset.date || "");
      }
      if (button.dataset.action === "scroll-tournament") {
        scrollToTournament(button.dataset.ordinal || "");
      }
    });

    els.previewOutput.addEventListener("input", (event) => {
      if (event.target.closest("[data-host-chapter], [data-reward-event-key], [data-reward-event-name], [data-reward-state-championship]")) {
        renderWorkflow();
      }
    });

    els.previewOutput.addEventListener("change", (event) => {
      if (event.target.closest("[data-host-chapter], [data-reward-event-key], [data-reward-event-name], [data-reward-state-championship]")) {
        renderWorkflow();
      }
    });

    els.sourceList.addEventListener("input", (event) => {
      const control = event.target.closest("[data-report-meta]");
      if (control) updateReportMetadataFromControl(control);
    });

    els.sourceList.addEventListener("change", (event) => {
      const linkSelect = event.target.closest("[data-link-reward-group]");
      if (linkSelect) {
        linkReportToRewardGroup(Number(linkSelect.dataset.linkRewardGroup), String(linkSelect.value || "").trim());
        return;
      }
      const control = event.target.closest("[data-report-meta]");
      if (control) {
        updateReportMetadataFromControl(control);
        if (control.dataset.reportMeta === "hostChapterId") render();
      }
    });

    els.sameDateList.addEventListener("dragstart", (event) => {
      const row = event.target.closest(".event-row[data-id]");
      if (!row) return;
      state.dragId = Number(row.dataset.id);
      row.classList.add("dragging");
      event.dataTransfer.effectAllowed = "move";
      event.dataTransfer.setData("text/plain", String(state.dragId));
    });

    els.sameDateList.addEventListener("dragend", () => {
      state.dragId = null;
      state.dragTargetId = null;
      render();
    });

    els.sameDateList.addEventListener("dragover", (event) => {
      const row = event.target.closest(".event-row[data-id]");
      if (!row || state.dragId === null) return;
      const targetId = Number(row.dataset.id);
      const source = state.reports.find((report) => report.id === state.dragId);
      const target = state.reports.find((report) => report.id === targetId);
      if (!source || !target || source.eventDate !== target.eventDate || source.id === target.id) return;
      event.preventDefault();
      state.dragTargetId = targetId;
      row.classList.add("drop-target");
    });

    els.sameDateList.addEventListener("dragleave", (event) => {
      const row = event.target.closest(".event-row");
      if (row) row.classList.remove("drop-target");
    });

    els.sameDateList.addEventListener("drop", (event) => {
      const row = event.target.closest(".event-row[data-id]");
      if (!row || state.dragId === null) return;
      event.preventDefault();
      const source = state.reports.find((report) => report.id === state.dragId);
      const target = state.reports.find((report) => report.id === Number(row.dataset.id));
      if (!source || !target || source.eventDate !== target.eventDate) return;
      const sequence = source.sequence;
      source.sequence = target.sequence;
      target.sequence = sequence;
      resetPreviewState();
      render();
    });

    const initialRunId = new URLSearchParams(window.location.search).get("run_id");
    loadMetadataOptions();
    if (initialRunId) {
      els.runIdInput.value = initialRunId;
      loadRun();
    } else {
      render();
    }
  </script>
</body>
</html>
